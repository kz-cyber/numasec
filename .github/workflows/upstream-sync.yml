name: Upstream Sync Check

on:
  schedule:
    - cron: "0 9 * * 1"  # ogni lunedì alle 9:00
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check opencode upstream for new commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream opencode
        run: |
          git remote add upstream https://github.com/sst/opencode.git || true
          git fetch upstream main --depth=50

      - name: Compare and generate report
        id: report
        run: |
          BASE=$(git log --oneline upstream/main -1 --format="%H")
          MERGE_BASE=$(git merge-base HEAD upstream/main 2>/dev/null || echo "unknown")

          NEW_COMMITS=$(git log --oneline ${MERGE_BASE}..upstream/main 2>/dev/null | head -30 || echo "Unable to compute diff")
          COUNT=$(git log --oneline ${MERGE_BASE}..upstream/main 2>/dev/null | wc -l | tr -d ' ' || echo "?")

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "merge_base=$MERGE_BASE" >> $GITHUB_OUTPUT

          # Write report to file (avoids multiline env issues)
          {
            echo "## Upstream opencode — $COUNT new commits since fork"
            echo ""
            echo "**Merge base:** \`$MERGE_BASE\`"
            echo "**Upstream HEAD:** \`$BASE\`"
            echo ""
            echo "### Commits"
            echo '```'
            echo "$NEW_COMMITS"
            echo '```'
            echo ""
            echo "### Files changed (top 30)"
            echo '```'
            git diff --name-only ${MERGE_BASE}..upstream/main 2>/dev/null | grep -E '\.(ts|tsx|py)$' | head -30 || echo "n/a"
            echo '```'
            echo ""
            echo "### Recommended actions"
            echo "- \`src/provider/\` changes → likely new model providers, low conflict risk"
            echo "- \`src/session/\` changes → core session logic, review carefully"
            echo "- \`src/agent/\` changes → skip (replaced by numasec agents)"
            echo "- \`packages/numasec/src/tool/\` changes → review for new tool types"
          } > /tmp/upstream_report.md

          cat /tmp/upstream_report.md

      - name: Create issue if new commits found
        if: steps.report.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/upstream_report.md', 'utf8')
            const count = '${{ steps.report.outputs.count }}'

            // Check if open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open'
            })

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
                title: `upstream: ${count} new commits from opencode`
              })
              console.log(`Updated existing issue #${issues.data[0].number}`)
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `upstream: ${count} new commits from opencode`,
                body: body,
                labels: ['upstream-sync']
              })
              console.log('Created new upstream sync issue')
            }
