name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pip install -e ".[all]"
      - run: ruff check numasec/
      - run: pytest tests/ -v -m "not slow and not benchmark" --tb=short
      - run: bun install
        working-directory: agent
      - run: bun run typecheck
        working-directory: agent/packages/numasec

  publish-pypi:
    name: Publish to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  build-agent:
    name: Build Agent Binary
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: agent
      - run: bun run build
        working-directory: agent/packages/numasec
      - uses: actions/upload-artifact@v4
        with:
          name: numasec-${{ matrix.os }}
          path: agent/packages/numasec/dist/

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
