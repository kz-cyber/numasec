id: header-remediation
category: remediation
title: Security Headers Remediation Guide
info:
  name: HTTP Security Headers Configuration
  severity: medium
  cwe: CWE-16
  owasp: "A05:2021"
  description: >
    Proper HTTP security headers provide defense-in-depth against common attacks.
    Missing headers are the most frequently found misconfiguration in web applications.

summary: >
  Configure all recommended security headers in your web server or application framework.
  Test with securityheaders.com or Mozilla Observatory after deployment.

headers:
  strict_transport_security:
    name: Strict-Transport-Security
    severity: high
    purpose: Prevents SSL stripping and forces HTTPS
    recommended: "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload"
    notes:
      - Start with short max-age (300) for testing, increase to 31536000 (1 year)
      - includeSubDomains applies to all subdomains
      - preload submits to browser preload lists (irreversible)
      - Only set on HTTPS responses

  content_security_policy:
    name: Content-Security-Policy
    severity: high
    purpose: Mitigates XSS, clickjacking, and data injection
    recommended: >
      Content-Security-Policy: default-src 'self';
      script-src 'self'; style-src 'self' 'unsafe-inline';
      img-src 'self' data:; font-src 'self';
      connect-src 'self'; frame-ancestors 'none';
      base-uri 'self'; form-action 'self'
    notes:
      - Start with Content-Security-Policy-Report-Only for monitoring
      - Use nonce-based or hash-based script whitelisting
      - Avoid 'unsafe-inline' for scripts
      - Use report-uri or report-to for violation reporting

  x_frame_options:
    name: X-Frame-Options
    severity: medium
    purpose: Prevents clickjacking by controlling framing
    recommended: "X-Frame-Options: DENY"
    alternatives: "SAMEORIGIN allows same-origin framing"
    notes:
      - Superseded by CSP frame-ancestors but still needed for older browsers
      - DENY blocks all framing, SAMEORIGIN allows same-origin

  x_content_type_options:
    name: X-Content-Type-Options
    severity: low
    purpose: Prevents MIME type sniffing
    recommended: "X-Content-Type-Options: nosniff"
    notes:
      - Only one valid value (nosniff)
      - Prevents browsers from interpreting files as different MIME types

  referrer_policy:
    name: Referrer-Policy
    severity: low
    purpose: Controls referrer information in navigation
    recommended: "Referrer-Policy: strict-origin-when-cross-origin"
    notes:
      - strict-origin-when-cross-origin is the best balance of security and functionality
      - no-referrer is most restrictive but may break analytics

  permissions_policy:
    name: Permissions-Policy
    severity: low
    purpose: Controls browser feature access (camera, microphone, geolocation)
    recommended: >
      Permissions-Policy: camera=(), microphone=(), geolocation=(),
      payment=(), usb=(), magnetometer=()
    notes:
      - Deny features not needed by your application
      - Replaces deprecated Feature-Policy header

server_configurations:
  nginx: |
    # nginx.conf or server block
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Hide server version
    server_tokens off;

  apache: |
    # .htaccess or httpd.conf
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset X-Powered-By
    ServerTokens Prod

  express_node: |
    // Using helmet middleware (recommended)
    const helmet = require("helmet");
    app.use(helmet());
    // Or manually:
    app.use((req, res, next) => {
      res.setHeader("Strict-Transport-Security", "max-age=31536000; includeSubDomains");
      res.setHeader("Content-Security-Policy", "default-src 'self'");
      res.setHeader("X-Frame-Options", "DENY");
      res.setHeader("X-Content-Type-Options", "nosniff");
      next();
    });

  django: |
    # settings.py
    SECURE_HSTS_SECONDS = 31536000
    SECURE_HSTS_INCLUDE_SUBDOMAINS = True
    SECURE_CONTENT_TYPE_NOSNIFF = True
    X_FRAME_OPTIONS = "DENY"
    CSP_DEFAULT_SRC = ("'self'",)
    # Requires django-csp package for CSP

  spring_boot: |
    // SecurityConfig.java
    @Bean
    SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
        http.headers(headers -> headers
            .httpStrictTransportSecurity(hsts -> hsts.maxAgeInSeconds(31536000))
            .frameOptions(frame -> frame.deny())
            .contentTypeOptions(Customizer.withDefaults())
            .referrerPolicy(ref -> ref.policy(
                ReferrerPolicyHeaderWriter.ReferrerPolicy.STRICT_ORIGIN_WHEN_CROSS_ORIGIN))
        );
        return http.build();
    }

references:
  - https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html
  - https://securityheaders.com
  - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers

tags:
  - configuration
  - headers
  - fix
