id: cwe-mapping
category: reference
title: CWE to OWASP Top 10 and MITRE ATT&CK Mapping
info:
  name: Vulnerability Classification Cross-Reference
  severity: informational
  description: >
    Maps Common Weakness Enumeration (CWE) identifiers to OWASP Top 10 2021
    categories and MITRE ATT&CK techniques. Used by the Perceptor to auto-enrich
    findings with standardized classification metadata.

mappings:
  # --- A01:2021 Broken Access Control ---
  CWE-22:
    name: Path Traversal
    owasp: "A01:2021"
    owasp_name: Broken Access Control
    attack_techniques:
      - T1083  # File and Directory Discovery
    severity: high
    description: Improper limitation of pathname to a restricted directory.

  CWE-284:
    name: Improper Access Control
    owasp: "A01:2021"
    owasp_name: Broken Access Control
    attack_techniques:
