id: business-logic-framework
category: detection
name: Business Logic Testing Framework
description: >
  Framework for testing application-specific business logic vulnerabilities.
  These tests must be adapted to each target's actual endpoints and workflows.

test_categories:
  price_manipulation:
    description: "Test if product/item prices can be set to zero, negative, or arbitrary values"
    cwe: "CWE-20"
    methodology:
      - "Identify product/item update endpoints (PUT/PATCH on resources with price fields)"
      - "Send price=0, price=-1, price=0.001 via PUT/PATCH"
      - "Verify if response confirms the manipulated price was accepted"
      - "Check if the change persists (GET the resource after modification)"
    detection_signals:
      - "200/204 response with modified price in response body"
      - "Subsequent GET returns the manipulated price"

  quantity_abuse:
    description: "Test if quantities can be negative (credit abuse) or exceed limits"
    cwe: "CWE-20"
    methodology:
      - "Identify cart/order item update endpoints (PUT/PATCH with quantity field)"
      - "Send quantity=-1, quantity=-100, quantity=99999"
      - "Check if total price becomes negative (credit to attacker)"
    detection_signals:
      - "200 response accepting negative quantity"
      - "Order total becomes negative or zero"

  workflow_bypass:
    description: "Test if required steps in multi-step processes can be skipped"
    cwe: "CWE-841"
    methodology:
      - "Identify multi-step workflows (checkout, password change, approval chains)"
      - "Skip required fields: submit password change without current password"
      - "Skip CAPTCHA: submit form without captcha field or with captcha=0"
      - "Skip confirmation: submit directly to final step endpoint"
      - "Test GET vs POST: does sensitive action work via GET (credentials in URL)?"
    detection_signals:
      - "200 response when required field is missing"
      - "Action succeeds without completing prerequisite steps"

  role_escalation:
    description: "Test if users can elevate their own privileges"
    cwe: "CWE-269"
    methodology:
      - "Identify user update endpoints (PUT/PATCH on user profile)"
      - "Send role=admin, isAdmin=true, privilege_level=0, group=administrators"
      - "Check if the server accepts the role change"
    detection_signals:
      - "200 response with elevated role in response body"
      - "Subsequent requests have elevated access"

  forged_identity:
    description: "Test if actions can be performed as another user"
    cwe: "CWE-639"
    methodology:
      - "Identify endpoints accepting a user ID parameter in the body"
      - "Submit a different user's ID with your auth token"
      - "Check if the action was attributed to the other user"
    detection_signals:
      - "200 response when UserId doesn't match authenticated user"
      - "Action visible under the forged user's account"

  captcha_bypass:
    description: "Test CAPTCHA implementation for weaknesses"
    cwe: "CWE-804"
    methodology:
      - "Submit form without CAPTCHA field entirely"
      - "Submit with captcha field set to 0, -1, or empty string"
      - "Reuse a previous valid CAPTCHA solution (replay attack)"
      - "Submit the same CAPTCHA answer on multiple consecutive requests"
    detection_signals:
      - "200 response without valid CAPTCHA"
      - "Same CAPTCHA accepted multiple times"

  rate_limit_abuse:
    description: "Test for missing or weak rate limiting on sensitive endpoints"
    cwe: "CWE-770"
    methodology:
      - "Send 100+ rapid requests to login endpoint with different passwords"
      - "Send rapid requests to password reset endpoint"
      - "Check if OTP/2FA codes can be brute-forced"
    detection_signals:
      - "No 429 responses after many rapid requests"
      - "All requests processed without throttling"
