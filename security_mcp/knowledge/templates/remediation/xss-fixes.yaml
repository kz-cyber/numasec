id: xss-remediation
category: remediation
title: Cross-Site Scripting Remediation Guide
info:
  name: XSS Fix Patterns
  severity: high
  cwe: CWE-79
  owasp: "A03:2021"
  description: >
    Comprehensive remediation for XSS vulnerabilities.
    Primary defense: context-aware output encoding.
    Secondary: Content Security Policy, input validation.

summary: >
  Apply context-aware output encoding for ALL user-controlled data rendered in HTML.
  Deploy Content Security Policy (CSP) headers as defense-in-depth.
  Use framework auto-escaping features. Never use innerHTML with untrusted data.

examples:
  python_jinja2:
    vulnerable: |
      <!-- VULNERABLE: Marking as safe disables auto-escaping -->
      {{ user_input | safe }}
      <!-- VULNERABLE: Using Markup() bypasses escaping -->
      Markup(f"<div>{user_input}</div>")
    fixed: |
      <!-- FIXED: Jinja2 auto-escapes by default -->
      {{ user_input }}
      <!-- Explicit escaping: -->
      {{ user_input | e }}

  python_django:
    vulnerable: |
      <!-- VULNERABLE: mark_safe disables auto-escaping -->
      {{ user_input | safe }}
      {% autoescape off %}{{ user_input }}{% endautoescape %}
    fixed: |
      <!-- FIXED: Django auto-escapes by default -->
      {{ user_input }}
      <!-- In Python code: -->
      from django.utils.html import escape
      safe_output = escape(user_input)

  javascript_react:
    vulnerable: |
      // VULNERABLE: dangerouslySetInnerHTML
      <div dangerouslySetInnerHTML={{__html: userInput}} />
    fixed: |
      // FIXED: React auto-escapes by default
      <div>{userInput}</div>
      // For rich text, use DOMPurify:
      import DOMPurify from "dompurify";
      <div dangerouslySetInnerHTML={{__html: DOMPurify.sanitize(html)}} />

  javascript_vanilla:
    vulnerable: |
      // VULNERABLE: innerHTML with user data
      element.innerHTML = userInput;
      document.write(userInput);
    fixed: |
      // FIXED: Use textContent for text data
      element.textContent = userInput;
      // For DOM manipulation:
      const el = document.createElement("div");
      el.textContent = userInput;
      parent.appendChild(el);

  java_spring:
    vulnerable: |
      // VULNERABLE: Disabling Thymeleaf escaping
      <span th:utext="${userInput}"></span>
    fixed: |
      <!-- FIXED: th:text auto-escapes -->
      <span th:text="${userInput}"></span>
      // In Java code:
      import org.apache.commons.text.StringEscapeUtils;
      String safe = StringEscapeUtils.escapeHtml4(userInput);

  php:
    vulnerable: |
      <!-- VULNERABLE: Direct echo -->
      <?php echo $userInput; ?>
      <?php echo $_GET['name']; ?>
    fixed: |
      <!-- FIXED: htmlspecialchars with ENT_QUOTES -->
      <?php echo htmlspecialchars($userInput, ENT_QUOTES, 'UTF-8'); ?>
      <!-- Or use a template engine with auto-escaping (Blade, Twig) -->

csp_header:
  description: >
    Content Security Policy header as defense-in-depth against XSS.
    Prevents execution of inline scripts and restricts script sources.
  recommended: |
    Content-Security-Policy: default-src 'self';
      script-src 'self' 'nonce-{random}';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
  nonce_example: |
    <!-- Server generates random nonce per request -->
    <script nonce="abc123">
      // Only scripts with matching nonce execute
    </script>

encoding_contexts:
  - context: HTML Body
    encoding: HTML entity encoding
    example: "&lt;script&gt; becomes visible text"
  - context: HTML Attribute
    encoding: HTML attribute encoding
    example: "Use quotes and encode &, <, >, \", '"
  - context: JavaScript
    encoding: JavaScript hex encoding
    example: "\\x3cscript\\x3e"
  - context: URL Parameter
    encoding: URL/percent encoding
    example: "%3Cscript%3E"
  - context: CSS Value
    encoding: CSS hex encoding
    example: "\\3c script\\3e"

references:
  - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
  - https://cheatsheetseries.owasp.org/cheatsheets/Content_Security_Policy_Cheat_Sheet.html

tags:
  - injection
  - client-side
  - fix
