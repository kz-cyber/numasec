id: sqli-remediation
category: remediation
title: SQL Injection Remediation Guide
info:
  name: SQL Injection Fix Patterns
  severity: high
  cwe: CWE-89
  owasp: "A03:2021"
  description: >
    Comprehensive remediation guide for SQL injection vulnerabilities.
    Primary defense: parameterized queries (prepared statements).
    Secondary: input validation, stored procedures, least privilege.

summary: >
  ALWAYS use parameterized queries or an ORM. Never concatenate user input
  into SQL strings. Apply defense-in-depth with input validation,
  least privilege database accounts, and WAF rules.

examples:
  python:
    vulnerable: |
      # VULNERABLE: String concatenation
      cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")
      cursor.execute("SELECT * FROM users WHERE name = '%s'" % name)
    fixed: |
      # FIXED: Parameterized query
      cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
    orm: |
      # BEST: Use ORM (SQLAlchemy)
      user = session.query(User).filter(User.id == user_id).first()

  python_django:
    vulnerable: |
      # VULNERABLE: raw SQL with f-string
      User.objects.raw(f"SELECT * FROM users WHERE name = '{name}'")
    fixed: |
      # FIXED: Django ORM (automatic parameterization)
      User.objects.filter(name=name)
      # Or with raw SQL using params:
      User.objects.raw("SELECT * FROM users WHERE name = %s", [name])

  java:
    vulnerable: |
      // VULNERABLE: String concatenation
      Statement stmt = conn.createStatement();
      stmt.executeQuery("SELECT * FROM users WHERE id = " + userId);
    fixed: |
      // FIXED: PreparedStatement
      PreparedStatement ps = conn.prepareStatement(
          "SELECT * FROM users WHERE id = ?");
      ps.setInt(1, userId);
      ResultSet rs = ps.executeQuery();

  java_spring:
    vulnerable: |
      // VULNERABLE: String concatenation in JdbcTemplate
      jdbcTemplate.queryForObject(
          "SELECT * FROM users WHERE id = " + id, User.class);
    fixed: |
      // FIXED: Parameterized JdbcTemplate
      jdbcTemplate.queryForObject(
          "SELECT * FROM users WHERE id = ?", User.class, id);
      // Or with Spring Data JPA:
      userRepository.findById(id);

  javascript_node:
    vulnerable: |
      // VULNERABLE: Template literal in query
      db.query(`SELECT * FROM users WHERE id = ${req.params.id}`);
    fixed: |
      // FIXED: Parameterized query
      db.query("SELECT * FROM users WHERE id = $1", [req.params.id]);
      // Or with Knex.js:
      knex("users").where("id", req.params.id);

  csharp:
    vulnerable: |
      // VULNERABLE: String concatenation
      var cmd = new SqlCommand(
          "SELECT * FROM users WHERE id = " + userId, conn);
    fixed: |
      // FIXED: SqlParameter
      var cmd = new SqlCommand(
          "SELECT * FROM users WHERE id = @id", conn);
      cmd.Parameters.AddWithValue("@id", userId);

  php:
    vulnerable: |
      // VULNERABLE: Direct variable interpolation
      $result = mysqli_query($conn,
          "SELECT * FROM users WHERE id = $id");
    fixed: |
      // FIXED: Prepared statement
      $stmt = $conn->prepare(
          "SELECT * FROM users WHERE id = ?");
      $stmt->bind_param("i", $id);
      $stmt->execute();

defense_in_depth:
  - layer: Input Validation
    description: >
      Validate input type, length, and format before use.
      Reject inputs that don't match expected patterns.
      This is a secondary defense, NOT a replacement for parameterized queries.
  - layer: Least Privilege
    description: >
      Database account used by the application should have minimal permissions.
      Read-only access where possible. No DROP, ALTER, or GRANT permissions.
  - layer: WAF Rules
    description: >
      Configure WAF to block common SQLi patterns as an additional layer.
      Never rely on WAF as the primary defense.
  - layer: Error Handling
    description: >
      Never expose database error messages to end users.
      Log detailed errors server-side, return generic messages to clients.

references:
  - https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html
  - https://cheatsheetseries.owasp.org/cheatsheets/Query_Parameterization_Cheat_Sheet.html

tags:
  - injection
  - database
  - fix
