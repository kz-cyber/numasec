args = ["acp"]

[agent_servers.numasec.targets.darwin-x86_64]
archive = "https://github.com/numasec/numasec/releases/download/v1.3.3/numasec-darwin-x64.zip"
cmd = "./numasec"
args = ["acp"]

[agent_servers.numasec.targets.linux-aarch64]
archive = "https://github.com/numasec/numasec/releases/download/v1.3.3/numasec-linux-arm64.tar.gz"
cmd = "./numasec"
args = ["acp"]

[agent_servers.numasec.targets.linux-x86_64]
archive = "https://github.com/numasec/numasec/releases/download/v1.3.3/numasec-linux-x64.tar.gz"
cmd = "./numasec"
args = ["acp"]

[agent_servers.numasec.targets.windows-x86_64]
