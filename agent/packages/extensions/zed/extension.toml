id = "numasec"
name = "numasec"
description = "AI-powered penetration testing platform."
version = "1.3.3"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/numasec/numasec"

[agent_servers.numasec]
name = "numasec"
