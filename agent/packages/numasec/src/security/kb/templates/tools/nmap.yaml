id: tool-nmap
name: Nmap Network Scanner
category: tools
description: >
  Guide for using nmap for port discovery, service detection, version
  fingerprinting, and NSE script scanning during penetration tests.

when_to_use:
  - "Initial reconnaissance to discover open ports and running services"
  - "Service version fingerprinting to identify exploitable software versions"
  - "NSE script scanning for known vulnerabilities (CVEs, default credentials)"
  - "OS detection to narrow down target architecture and attack surface"
  - "When naabu is unavailable or you need deeper service analysis"

basic_usage:
  quick_scan: "nmap -sV -sC -T4 --top-ports 1000 TARGET"
  full_tcp: "nmap -sV -sC -p- -T4 TARGET"
  udp_top: "nmap -sU --top-ports 50 -T4 TARGET"
  single_port: "nmap -sV -sC -p 8080 TARGET"

advanced_flags:
  version_intensity: "-sV --version-intensity 5  (more probes, slower but more accurate)"
  os_detection: "-O --osscan-guess  (best-effort OS fingerprinting)"
  script_vuln: "--script vuln  (run all vulnerability detection scripts)"
  script_specific: "--script http-sql-injection,http-xss  (targeted script selection)"
  timing: "-T3 for stealth, -T4 for fast, -T5 for insane (may miss results)"
  output_xml: "-oX scan.xml  (machine-parseable output for downstream tools)"
  no_ping: "-Pn  (skip host discovery, scan even if ICMP is blocked)"
  service_scripts: "--script http-enum,http-headers,http-methods  (web server recon)"

output_interpretation:
  port_states:
    open: "Port is accepting connections — service is running"
    closed: "Port responds with RST — no service but host is up"
    filtered: "No response — firewall is dropping packets"
  key_fields:
    - "PORT: port number and protocol (e.g., 443/tcp)"
    - "STATE: open, closed, filtered"
    - "SERVICE: detected service name (http, ssh, mysql)"
    - "VERSION: software version string (e.g., Apache httpd 2.4.49)"
  critical_findings:
    - "Outdated software versions (compare against CVE databases)"
    - "Default/debug services on non-standard ports (e.g., debug on 9090)"
    - "Database ports exposed to the internet (3306, 5432, 27017)"
    - "Management interfaces open (SSH, RDP, admin panels)"

common_pitfalls:
  - "Scanning without -Pn on cloud hosts — ICMP may be blocked, missing all ports"
  - "Using -T5 and missing open ports due to packet loss under aggressive timing"
  - "Forgetting UDP scan — DNS (53), SNMP (161), TFTP (69) are often overlooked"
  - "Not saving output (-oX or -oN) — you cannot re-parse results later"
  - "Running full port scan (-p-) on large ranges — takes hours, scope appropriately"
