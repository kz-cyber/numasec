id: tool-nuclei
name: Nuclei Vulnerability Scanner
category: tools
description: >
  Guide for using Nuclei for template-based vulnerability scanning. Nuclei excels
  at detecting known CVEs, misconfigurations, and exposed panels using a large
  community-maintained template library.

when_to_use:
  - "After port/service discovery to check for known CVEs on detected software"
  - "To detect misconfigurations, default credentials, and exposed admin panels"
  - "To scan for technology-specific vulnerabilities (WordPress, Jira, Jenkins, etc.)"
  - "As a complement to manual testing — catches known issues while you focus on logic bugs"
  - "When you need fast, broad coverage of common vulnerabilities across many targets"

basic_usage:
  single_target: "nuclei -u https://target.com -t cves/ -severity high,critical"
  target_list: "nuclei -l targets.txt -t cves/ -t misconfigurations/"
  all_templates: "nuclei -u https://target.com -automatic-scan"
  specific_tech: "nuclei -u https://target.com -tags wordpress,apache"

advanced_flags:
  severity_filter: "-severity critical,high  (skip low/medium noise)"
  tag_filter: "-tags cve,sqli,xss  (focus on specific vulnerability types)"
  rate_limit: "-rate-limit 50  (requests per second — respect target capacity)"
  concurrency: "-concurrency 10  (parallel template execution)"
  proxy: "-proxy http://127.0.0.1:8080  (route through Burp for inspection)"
  output_json: "-json -output results.json  (structured output for parsing)"
  new_templates: "-new-templates  (run only recently added templates)"
  template_update: "nuclei -update-templates  (fetch latest template definitions)"
  header_inject: "-header 'Authorization: Bearer TOKEN'  (authenticated scanning)"
  exclude: "-exclude-tags dos  (skip denial-of-service templates)"

output_interpretation:
  finding_format: "[severity] [template-id] [protocol] [matched-url] [extra-info]"
  example_output:
    - "[critical] CVE-2021-44228 [http] https://target.com/api [log4j RCE]"
    - "[high] exposed-panels:jenkins [http] https://target.com:8080 [Jenkins dashboard]"
    - "[medium] misconfiguration:cors [http] https://target.com [wildcard CORS]"
  severity_meaning:
    critical: "Actively exploitable, likely RCE or full compromise"
    high: "Significant impact — data exposure, auth bypass"
    medium: "Moderate risk — information disclosure, misconfigurations"
    low: "Minor issues — version disclosure, missing headers"
    info: "Informational — technology detection, no direct risk"

common_pitfalls:
  - "Running all templates without filtering — generates massive noise on large apps"
  - "Not updating templates — missing newly published CVE detections"
  - "Ignoring -rate-limit on production targets — can cause service degradation"
  - "Treating Nuclei results as confirmed without manual validation — some templates have false positives"
  - "Skipping authenticated scanning — many vulnerabilities only appear behind login"
  - "Not excluding DoS templates (-exclude-tags dos) — can crash target services"
