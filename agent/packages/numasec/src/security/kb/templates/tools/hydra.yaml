id: tool-hydra
name: Hydra Brute Force Tool
category: tools
description: >
  Guide for using Hydra for online brute force attacks against authentication
  services. Covers HTTP forms, Basic auth, SSH, FTP, and other protocols.
  Always verify authorization and scope before brute forcing.

when_to_use:
  - "To test default credentials on discovered login panels and services"
  - "To test account lockout policies and brute force resilience"
  - "After discovering SSH, FTP, or database ports open to the network"
  - "When password policy testing indicates weak credentials may exist"
  - "NOT for credential stuffing large lists — use targeted small wordlists"

basic_usage:
  http_form: >
    hydra -l admin -P passwords.txt target.com http-post-form
    "/login:user=^USER^&pass=^PASS^:Invalid credentials"
  http_basic: "hydra -l admin -P passwords.txt target.com http-get /admin"
  ssh: "hydra -l root -P passwords.txt ssh://target.com"
  ftp: "hydra -l anonymous -P passwords.txt ftp://target.com"
  mysql: "hydra -l root -P passwords.txt mysql://target.com"

advanced_flags:
  user_list: "-L users.txt  (file of usernames instead of single -l)"
  pass_list: "-P passwords.txt  (file of passwords)"
  combo_list: "-C combos.txt  (user:pass format, one per line)"
  threads: "-t 4  (parallel connections — keep low to avoid lockouts)"
  wait: "-W 3  (wait seconds between attempts per thread)"
  verbose: "-V  (show each attempt — useful for debugging form syntax)"
  specific_port: "-s 8443  (non-standard port)"
  ssl: "-S  (use SSL/TLS for the connection)"
  exit_on_success: "-f  (stop after first valid credential found)"
  output: "-o results.txt  (save successful credentials to file)"

output_interpretation:
  success: "'[PORT][SERVICE] host: TARGET   login: USER   password: PASS'"
  failure: "'0 valid passwords found' — no credentials matched"
  key_indicators:
    - "Green [DATA] lines show each attempt being made"
    - "Successful credentials are highlighted and summarized at the end"
    - "Connection errors indicate firewall blocks or service rate limiting"
  http_form_setup: |
    The http-post-form syntax is: "path:body:failure_string"
    - path: the login form action URL
    - body: POST parameters with ^USER^ and ^PASS^ placeholders
    - failure_string: a string that appears ONLY on failed login
    Find the failure string by submitting a wrong password and noting
    unique text in the response (e.g., "Invalid credentials", "Login failed").

common_pitfalls:
  - "Using too many threads (-t 64) — triggers account lockouts and IP bans"
  - "Wrong failure string in http-post-form — Hydra reports all attempts as successful"
  - "Not URL-encoding special characters in form parameters"
  - "Testing without authorization — brute force is noisy and potentially illegal"
  - "Using massive password lists — keep lists targeted (top 100-500 passwords)"
  - "Forgetting -S flag on HTTPS endpoints — connection fails silently"
