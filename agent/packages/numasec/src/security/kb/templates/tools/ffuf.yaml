id: tool-ffuf
name: ffuf Web Fuzzer
category: tools
description: >
  Guide for using ffuf for directory brute forcing, file discovery, parameter
  fuzzing, and virtual host enumeration. Fast and flexible Go-based fuzzer
  ideal for content discovery during web application assessments.

when_to_use:
  - "During recon to discover hidden directories, files, and endpoints"
  - "To find backup files (.bak, .old, .swp), config files, and source code"
  - "To fuzz parameters for hidden functionality or injection points"
  - "To enumerate virtual hosts and subdomains via Host header fuzzing"
  - "When you need faster results than gobuster with more flexible filtering"

basic_usage:
  dir_brute: "ffuf -u https://target.com/FUZZ -w /usr/share/wordlists/dirb/common.txt"
  file_ext: "ffuf -u https://target.com/FUZZ -w wordlist.txt -e .php,.bak,.conf,.env"
  param_fuzz: "ffuf -u 'https://target.com/api?FUZZ=test' -w params.txt"
  post_fuzz: "ffuf -u https://target.com/login -X POST -d 'user=admin&FUZZ=test' -w params.txt"
  vhost: "ffuf -u https://target.com -H 'Host: FUZZ.target.com' -w subdomains.txt"

advanced_flags:
  filter_status: "-fc 404,403  (filter out these status codes)"
  filter_size: "-fs 1234  (filter responses of exact size — removes default pages)"
  filter_words: "-fw 42  (filter by word count — useful for identical error pages)"
  match_status: "-mc 200,301,302  (only show these status codes)"
  rate_limit: "-rate 100  (requests per second)"
  threads: "-t 50  (concurrent threads, default 40)"
  recursion: "-recursion -recursion-depth 2  (auto-fuzz discovered directories)"
  output: "-o results.json -of json  (save results for parsing)"
  header: "-H 'Authorization: Bearer TOKEN'  (authenticated fuzzing)"
  cookie: "-b 'session=abc123'  (include session cookie)"
  timeout: "-timeout 10  (per-request timeout in seconds)"
  proxy: "-x http://127.0.0.1:8080  (route through Burp)"

output_interpretation:
  columns: "Status | Size | Words | Lines | Duration | URL"
  what_to_look_for:
    - "200 responses with unique sizes — likely real content, not error pages"
    - "301/302 redirects — directories exist, follow them"
    - "403 Forbidden — resource exists but is access-controlled (test bypass)"
    - "500 errors — potential injection point or misconfiguration"
    - "Size anomalies — responses significantly larger/smaller than the baseline"
  filtering_strategy: |
    1. Run first without filters to see the baseline response
    2. Note the size/word count of default 404 or error responses
    3. Re-run with -fs (filter size) set to the default response size
    This eliminates noise and shows only real discoveries.

common_pitfalls:
  - "Not filtering results — default responses flood output, hiding real findings"
  - "Using too many threads on production — can trigger WAF blocks or DoS the target"
  - "Forgetting -e for file extensions — misses .bak, .env, .config files"
  - "Not using -fc 404 when the server returns custom 404 pages with 200 status"
  - "Missing FUZZ keyword in the URL — ffuf silently does nothing without it"
