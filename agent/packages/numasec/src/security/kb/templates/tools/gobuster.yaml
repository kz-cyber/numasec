id: tool-gobuster
name: Gobuster Directory and DNS Brute Forcer
category: tools
description: >
  Guide for using Gobuster for directory brute forcing, DNS subdomain enumeration,
  and virtual host discovery. Simple, fast, and reliable Go-based tool for content
  discovery during web application reconnaissance.

when_to_use:
  - "During recon to discover hidden directories and files on web servers"
  - "For DNS subdomain enumeration when mapping the attack surface"
  - "For virtual host discovery on shared hosting or cloud environments"
  - "When you need a simpler alternative to ffuf for straightforward brute forcing"
  - "When recursion is not needed — gobuster does not recurse by default (use ffuf for that)"

basic_usage:
  dir_mode: "gobuster dir -u https://target.com -w /usr/share/wordlists/dirb/common.txt"
  dns_mode: "gobuster dns -d target.com -w subdomains.txt"
  vhost_mode: "gobuster vhost -u https://target.com -w vhosts.txt --append-domain"
  with_extensions: "gobuster dir -u https://target.com -w wordlist.txt -x php,html,bak,env"

advanced_flags:
  threads: "-t 50  (concurrent threads, default 10)"
  status_codes: "-s 200,204,301,302,307,401,403  (show only these status codes)"
  exclude_codes: "-b 404,503  (hide these status codes)"
  expanded: "-e  (show full URL in output instead of just the path)"
  no_tls_verify: "-k  (skip TLS certificate verification)"
  proxy: "--proxy http://127.0.0.1:8080  (route through Burp)"
  cookies: "-c 'session=abc123'  (include cookies for authenticated discovery)"
  headers: "-H 'Authorization: Bearer TOKEN'  (custom headers)"
  output: "-o results.txt  (save results to file)"
  wildcard_handling: "--wildcard  (force processing even with wildcard DNS responses)"
  follow_redirect: "-r  (follow redirects)"
  timeout: "--timeout 10s  (per-request timeout)"

output_interpretation:
  dir_mode_output: "/path (Status: CODE) [Size: BYTES]"
  key_signals:
    - "Status 200 with varying sizes — real content discovered"
    - "Status 301/302 — directory exists, likely has index or redirects to content"
    - "Status 403 — exists but access denied (try bypass: /path/, /path/., /PATH)"
    - "Status 401 — requires authentication (try default credentials)"
    - "Status 500 — server error, potential misconfiguration or injection point"
  dns_mode_output: "Found: subdomain.target.com"
  interesting_directories:
    - "/admin, /administrator, /manage — admin panels"
    - "/api, /v1, /v2 — API endpoints"
    - "/backup, /bak, /old — backup files"
    - "/.git, /.svn, /.env — version control and config exposure"
    - "/phpmyadmin, /adminer — database management interfaces"

common_pitfalls:
  - "Not using -x for file extensions — misses .php, .bak, .env, .config files"
  - "Low thread count on large wordlists — -t 50 is usually safe and much faster"
  - "Not handling wildcard responses — every request returns 200, flooding output"
  - "Forgetting -k on self-signed HTTPS — scan fails with TLS errors"
  - "Using gobuster when recursion is needed — switch to ffuf with -recursion instead"
  - "Not trying different wordlists — common.txt misses app-specific paths"
