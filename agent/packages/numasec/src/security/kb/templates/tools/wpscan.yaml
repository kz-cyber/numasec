id: tool-wpscan
name: WPScan WordPress Scanner
category: tools
description: >
  Guide for using WPScan to assess WordPress installations for vulnerable plugins,
  themes, misconfigurations, and user enumeration. Essential when WordPress is
  detected during reconnaissance.

when_to_use:
  - "When WordPress is detected via fingerprinting (wp-content/, wp-login.php, meta generator)"
  - "To enumerate installed plugins and themes and check for known CVEs"
  - "To discover WordPress usernames for targeted authentication testing"
  - "To check for WordPress core version vulnerabilities"
  - "After discovering any CMS that looks like WordPress — confirm and scan"

basic_usage:
  default_scan: "wpscan --url https://target.com --enumerate vp,vt,u"
  aggressive: "wpscan --url https://target.com --enumerate ap,at,u --plugins-detection aggressive"
  with_api: "wpscan --url https://target.com --api-token YOUR_TOKEN --enumerate vp,vt,u"
  password_attack: "wpscan --url https://target.com -U admin -P passwords.txt"

advanced_flags:
  enumerate_options:
    vp: "Vulnerable plugins only (fast, recommended first pass)"
    ap: "All plugins (slower, catches plugins with no known vulns)"
    vt: "Vulnerable themes"
    at: "All themes"
    u: "Users (via author archives and REST API)"
    cb: "Config backups (wp-config.php.bak, etc.)"
    dbe: "Database exports (.sql files in webroot)"
  detection_mode: "--plugins-detection aggressive  (sends more requests, finds more plugins)"
  stealthy: "--random-user-agent --throttle 500  (slower but less detectable)"
  proxy: "--proxy http://127.0.0.1:8080  (route through Burp)"
  force: "--force  (scan even if WordPress is not confirmed)"
  output: "--output results.json --format json  (structured output)"
  disable_tls: "--disable-tls-checks  (skip certificate validation)"
  api_token: "--api-token TOKEN  (WPVulnDB API for detailed vulnerability data)"

output_interpretation:
  finding_types:
    - "[!] — Warning/vulnerability found (requires attention)"
    - "[+] — Informational finding (technology detected, user found)"
    - "[i] — General information"
  critical_findings:
    - "Vulnerable plugin with known RCE exploit"
    - "WordPress core version with unpatched critical CVE"
    - "wp-config.php backup accessible (database credentials exposed)"
    - "XML-RPC enabled with system.multicall (brute force amplification)"
    - "Directory listing on /wp-content/uploads/ (data exposure)"
  user_enumeration: |
    Found usernames can be used for targeted password attacks:
    - Users found via /wp-json/wp/v2/users REST API
    - Users found via /?author=1, /?author=2 enumeration
    - Admin username is a high-value target for brute force

common_pitfalls:
  - "Not using --api-token — vulnerability details are limited without WPVulnDB access"
  - "Using aggressive detection on production sites — generates thousands of requests"
  - "Ignoring XML-RPC findings — system.multicall enables amplified brute force"
  - "Not checking wp-config.php backup files (.bak, .old, .save, ~)"
  - "Stopping after plugin scan — also check themes, users, and config backups"
  - "Assuming WordPress is not present because /wp-login.php returns 404 — check /wp-admin/"
