id: tool-nikto
name: Nikto Web Server Scanner
category: tools
description: >
  Guide for using Nikto to scan web servers for misconfigurations, dangerous
  files, outdated software, and common vulnerabilities. Nikto is noisy but
  thorough — use it for broad surface coverage during initial reconnaissance.

when_to_use:
  - "During initial recon to quickly identify web server misconfigurations"
  - "To detect dangerous default files, backup files, and admin interfaces"
  - "To check for outdated server software and known vulnerable versions"
  - "To verify security headers (X-Frame-Options, CSP, HSTS) are present"
  - "As a complement to manual testing — catches common issues automatically"
  - "NOT for stealth assessments — Nikto sends thousands of requests and is easily detected"

basic_usage:
  default_scan: "nikto -h https://target.com"
  specific_port: "nikto -h target.com -p 8443 -ssl"
  save_output: "nikto -h https://target.com -o report.html -Format htm"
  with_proxy: "nikto -h https://target.com -useproxy http://127.0.0.1:8080"

advanced_flags:
  tuning: "-Tuning 1234abc  (select test categories: 1=files, 2=misconfig, 3=info, 4=injection)"
  plugins: "-Plugins tests  (select specific plugin sets)"
  evasion: "-evasion 1  (IDS evasion: 1=random URI encoding, others exist)"
  timeout: "-timeout 10  (per-request timeout in seconds)"
  auth: "-id admin:password  (HTTP Basic auth credentials)"
  no_ssl_check: "-nossl  (skip SSL certificate warnings)"
  specific_root: "-root /app/  (prepend path to all test URIs)"
  vhost: "-vhost hostname  (set Host header for virtual host testing)"
  update: "nikto -update  (update vulnerability database)"

output_interpretation:
  format: "'+ URL - Finding description'"
  severity_indicators:
    critical:
      - "OSVDB entries referencing RCE or authentication bypass"
      - "Default credentials found on admin interfaces"
      - "Dangerous HTTP methods enabled (PUT, DELETE on webroot)"
    high:
      - "Directory listing enabled on sensitive paths"
      - "Backup/config files accessible (.bak, .conf, .env, web.config)"
      - "Server version with known CVEs"
    medium:
      - "Missing security headers (X-Frame-Options, CSP, HSTS)"
      - "Verbose error pages leaking stack traces or paths"
      - "HTTP TRACE method enabled (potential XST attack)"
    low:
      - "Server version banner disclosure"
      - "ETag header leaking inode information"
  false_positive_check: |
    Nikto has a moderate false positive rate. For each finding:
    1. Manually request the reported URL — verify the file/path exists
    2. Check if the response is a custom 404 (Nikto may flag soft 404s)
    3. Verify server headers match what Nikto reports

common_pitfalls:
  - "Treating all Nikto findings as confirmed — always manually verify"
  - "Running Nikto during stealth assessments — it is extremely noisy"
  - "Not specifying -ssl on HTTPS targets — scan runs over plain HTTP"
  - "Ignoring -Tuning options — full scan is slow, tune for relevant checks"
  - "Not updating the database before scanning — misses recent vulnerabilities"
