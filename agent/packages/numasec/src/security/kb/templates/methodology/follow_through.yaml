id: methodology-follow-through
name: Post-Discovery Exploitation Validation
category: methodology
description: >
  Methodology for validating and following through on discovered vulnerabilities.
  Confirms findings are exploitable, tests escalation potential, gathers evidence,
  and documents proof-of-concept for the final report. Reduces false positives
  and maximizes finding impact.

steps:
  - step: 1
    name: Confirm the Finding
    actions:
      - "Reproduce the vulnerability at least twice to rule out transient behavior"
      - "Test from a different session/IP to confirm it is not session-specific"
      - "Verify the root cause: is this a true positive or a WAF/proxy artifact?"
      - "For injection: confirm with a benign proof payload before attempting extraction"
      - "For auth issues: verify with two different user accounts to confirm the scope"
    validation_signals:
      true_positive:
        - "Consistent reproduction across multiple attempts"
        - "Behavioral difference matches the expected vulnerability signature"
        - "Server-side evidence (data changed, error message, timing difference)"
      false_positive:
        - "Only works with cached response, not a fresh request"
        - "WAF or CDN is reflecting payload but backend is not processing it"
        - "Timing difference is within normal variance (< 1 second)"

  - step: 2
    name: Attempt Escalation
    actions:
      - "SQLi read → attempt write (INSERT/UPDATE), then file read (LOAD_FILE)"
      - "XSS reflected → attempt stored, then test cookie theft, keylogging"
      - "IDOR read → attempt write/delete on the same resource"
      - "SSRF internal → attempt cloud metadata (169.254.169.254), internal admin panels"
      - "LFI → attempt RCE via log poisoning, PHP wrappers, or /proc/self/environ"
      - "Auth bypass → attempt admin access, user management, data export"
    escalation_priority: |
      Always escalate in this order (safest to most impactful):
      1. Read-only access (confirm scope)
      2. Write access (modify test data only)
      3. Privilege escalation (access admin features)
      4. Data exfiltration (demonstrate scope of breach)
      5. Code execution (if authorized and in scope)

  - step: 3
    name: Test Impact Scope
    actions:
      - "Determine how many users/records are affected (count, not extract all data)"
      - "Check if the vulnerability affects multiple endpoints (same root cause)"
      - "Test if the finding persists across application restarts or deployments"
      - "Identify the blast radius: one user, all users, or infrastructure-level?"
      - "For data exposure: categorize data sensitivity (PII, credentials, financial, health)"

  - step: 4
    name: Gather Evidence
    actions:
      - "Capture full HTTP request and response for each exploitation step"
      - "Record timestamps for all evidence (UTC)"
      - "For XSS: capture the rendered payload in the browser/response body"
      - "For SQLi: capture extracted data sample (2-3 rows, never dump full tables)"
      - "For auth: capture before/after showing privilege difference"
      - "For SSRF: capture the internal response content as proof of reach"
    evidence_checklist:
      - "Raw HTTP request (including headers, cookies, body)"
      - "Raw HTTP response (status code, headers, relevant body excerpt)"
      - "Timestamp (UTC) of the test"
      - "Account/session used for the test"
      - "Any data retrieved as proof (sanitized — no real user PII in reports)"

  - step: 5
    name: Document Proof of Concept
    actions:
      - "Write a step-by-step reproduction guide that a developer can follow"
      - "Include curl commands or HTTP requests that reproduce the finding"
      - "State prerequisites: authentication state, required roles, specific endpoints"
      - "Document the expected vs actual behavior clearly"
      - "Note any cleanup needed (delete test data, revoke test tokens)"
    poc_template: |
      ## Finding: [Title]
      **Severity**: [Critical/High/Medium/Low]
      **Endpoint**: [METHOD /path]
      **Prerequisites**: [Auth state, role, etc.]

      ### Steps to Reproduce
      1. [First step with exact request]
      2. [Second step]
      3. [Observe: describe what happens]

      ### Expected Behavior
      [What should happen]

      ### Actual Behavior
      [What actually happens — the vulnerability]

      ### Evidence
      [HTTP request/response excerpts]

tips:
  - "Never extract more data than needed to prove the finding — 2-3 sample rows suffice"
  - "Use benign payloads when possible (SELECT version() instead of DROP TABLE)"
  - "Always check scope authorization before attempting escalation beyond read access"
  - "Timestamp all evidence — it is critical for incident response correlation"

common_mistakes:
  - "Reporting a finding as confirmed without actually reproducing it twice"
  - "Extracting entire database tables instead of a minimal proof sample"
  - "Not testing escalation — a medium SQLi that leads to RCE is critical"
  - "Writing PoC steps that only work in the tester's specific environment"
  - "Forgetting to clean up test data (injected XSS payloads, created accounts)"
