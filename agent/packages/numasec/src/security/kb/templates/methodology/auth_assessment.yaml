id: methodology-auth-assessment
name: Authentication and Session Management Assessment
category: methodology
description: >
  Comprehensive authentication and session management testing playbook. Covers
  credential policies, brute force resilience, session handling, JWT security,
  OAuth flows, MFA bypass techniques, and password reset flaws.

steps:
  - step: 1
    name: Credential Policy Analysis
    actions:
      - "Attempt registration with weak passwords (123456, password, single char)"
      - "Test minimum length enforcement — try 1-char, 4-char, 7-char passwords"
      - "Check if complexity rules are client-side only (bypass JS validation)"
      - "Test if common/breached passwords are rejected (admin, letmein, qwerty)"
      - "Verify username/email enumeration via registration, login, and reset flows"
      - "Check password change requires current password confirmation"

  - step: 2
    name: Brute Force Resilience
    actions:
      - "Send 20+ failed logins for one account — check for lockout or CAPTCHA"
      - "Measure response time difference between valid username + wrong password vs invalid username"
      - "Test credential stuffing: rotate username/password pairs to avoid per-account lockout"
      - "Check if lockout can be bypassed via API endpoint vs web login form"
      - "Test if X-Forwarded-For rotation bypasses IP-based rate limiting"
      - "Verify lockout recovery mechanism (time-based, admin unlock, CAPTCHA)"

  - step: 3
    name: Session Fixation and Handling
    actions:
      - "Record session token before login, verify it changes after authentication"
      - "Test session fixation: set a known session ID via cookie, then authenticate"
      - "Verify session invalidation on logout (replay the old session cookie)"
      - "Check session timeout: leave session idle, test if it expires within policy window"
      - "Test concurrent session limits — log in from multiple browsers simultaneously"
      - "Inspect cookie flags: Secure, HttpOnly, SameSite, Domain, Path"

  - step: 4
    name: JWT Analysis
    actions:
      - "Decode JWT header and payload — check algorithm, expiration, issuer claims"
      - "Test alg:none attack: set algorithm to 'none', remove signature"
      - "Brute-force HS256 secret with common wordlist (jwt-cracker, hashcat)"
      - "Test RS256→HS256 key confusion: sign with public key using HMAC"
      - "Modify claims (role, sub, admin) and re-sign with discovered/weak key"
      - "Check if expired tokens are still accepted (missing exp validation)"
      - "Test kid (key ID) header injection for path traversal or SQL injection"

  - step: 5
    name: OAuth Flow Testing
    actions:
      - "Test redirect_uri manipulation: open redirect, subdomain takeover, path traversal"
      - "Test scope escalation: request broader scopes than the app should have"
      - "Check for authorization code reuse (replay the same code twice)"
      - "Test state parameter: remove it, reuse it, check for CSRF in OAuth flow"
      - "Verify token exchange: can an authorization code be exchanged by a different client?"
      - "Test for token leakage in Referer headers after redirect"

  - step: 6
    name: MFA Bypass Techniques
    actions:
      - "Check if MFA step can be skipped by navigating directly to post-auth URL"
      - "Test if MFA code can be brute-forced (4-6 digit codes without rate limiting)"
      - "Check if backup codes are predictable or reusable"
      - "Test if MFA can be disabled without re-authentication"
      - "Verify MFA is enforced on API endpoints, not just the web UI"
      - "Test if remember-me token bypasses MFA indefinitely"

  - step: 7
    name: Password Reset Flaws
    actions:
      - "Check if reset token is predictable (sequential, timestamp-based, short)"
      - "Test reset token expiration — use a token after 24+ hours"
      - "Verify token is single-use (replay the same reset link twice)"
      - "Test Host header injection: does reset email contain attacker-controlled domain?"
      - "Check if password reset reveals whether email/username exists"
      - "Test if reset link works after password has already been changed"

tips:
  - "Always check the API separately from the web UI — auth controls may differ"
  - "Look for timing differences in responses — they reveal valid vs invalid usernames"
  - "Test JWT with jwt.io for quick decoding, then use python-jwt or jwt_tool for attacks"
  - "Password reset host header injection: set Host to your server, check if email contains it"

common_mistakes:
  - "Not testing session invalidation on password change (old sessions should be killed)"
  - "Only testing MFA on login — forgetting API tokens, mobile app sessions"
  - "Ignoring remember-me tokens as a persistence mechanism"
  - "Not checking if OAuth state parameter is validated server-side"
  - "Assuming JWT is secure because it uses RS256 — check key management too"
