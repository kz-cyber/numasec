id: methodology-chain-building
name: Attack Chain Construction Methodology
category: methodology
description: >
  Guide for constructing attack chains from individual security findings. Attack
  chains demonstrate how low/medium-severity findings combine into critical impact
  scenarios, dramatically increasing the value and urgency of a penetration test report.

steps:
  - step: 1
    name: Identify Related Findings
    actions:
      - "Group findings by URL base path — vulnerabilities on the same feature often chain"
      - "Group findings by vulnerability class (all auth issues, all injection points)"
      - "Look for findings that share parameters (same cookie, same API key, same user ID)"
      - "Identify information disclosure findings that enable exploitation of other vulns"
      - "Map findings to the kill chain: recon → access → escalation → exfiltration"
    examples:
      - "CORS misconfiguration + reflected XSS = cross-origin account takeover"
      - "IDOR on user profile + CSRF = modify any user's email → password reset → ATO"
      - "Open redirect + OAuth = steal authorization code via redirect_uri manipulation"

  - step: 2
    name: Test Escalation Paths
    actions:
      - "For each low/medium finding, ask: what can an attacker DO with this access?"
      - "Test if information disclosure enables credential extraction or further enumeration"
      - "Test if IDOR + privilege escalation combine for full admin access"
      - "Test if SSRF can reach internal services discovered during recon"
      - "Verify each link in the chain with a working exploit — no theoretical chains"
    escalation_patterns:
      - from: "Information Disclosure"
        to: "Credential Theft"
        via: "Leaked API keys, internal paths, or debug endpoints"
      - from: "SQL Injection (read)"
        to: "Authentication Bypass"
        via: "Extract password hashes or session tokens from database"
      - from: "SSRF"
        to: "Remote Code Execution"
        via: "Access internal admin panels, cloud metadata (169.254.169.254)"
      - from: "XSS (stored)"
        to: "Account Takeover"
        via: "Steal session cookies or inject credential-harvesting form"

  - step: 3
    name: Quantify Combined Impact
    actions:
      - "Calculate chain severity as the MAXIMUM impact achievable, not the sum"
      - "A chain of 3 medium findings that achieves RCE is Critical, not 3× Medium"
      - "Document the business impact: data breach scope, user count, financial exposure"
      - "Compare to CVSS environmental metrics for the target organization"
      - "Identify which link in the chain is easiest to fix (recommend breaking the chain)"
    severity_escalation:
      - chain: "Info Disclosure → SQLi → Admin Access"
        individual_severities: ["Low", "High", "N/A"]
        chain_severity: "Critical"
        rationale: "Full database compromise and admin panel access"
      - chain: "Open Redirect → OAuth Token Theft → Account Takeover"
        individual_severities: ["Low", "N/A", "N/A"]
        chain_severity: "High"
        rationale: "Arbitrary account takeover via phishing-assisted OAuth flow"

  - step: 4
    name: Document the Narrative
    actions:
      - "Write a step-by-step attack narrative a developer can follow to reproduce"
      - "Include exact HTTP requests and responses for each step in the chain"
      - "Annotate which finding each step exploits (reference finding IDs)"
      - "Include a visual chain diagram: Finding A → Finding B → Impact"
      - "Provide a recommended fix that breaks the chain at its weakest link"
    narrative_template: |
      ## Attack Chain: [Title]
      **Impact**: [Critical/High description]
      **Steps**:
      1. [Exploit Finding A] — [HTTP request/response summary]
      2. [Use output from step 1 to exploit Finding B] — [details]
      3. [Achieve final impact] — [evidence]
      **Recommended Fix**: [Fix the weakest link]

tips:
  - "Low-severity findings often become critical when chained — never dismiss them outright"
  - "SSRF + cloud metadata is almost always a chain to document (AWS keys, GCP tokens)"
  - "XSS + missing CSP + sensitive cookies without HttpOnly = guaranteed session hijack chain"
  - "Present chains to stakeholders first — they communicate risk better than finding lists"

common_mistakes:
  - "Presenting theoretical chains without actually testing each step end-to-end"
  - "Rating chain severity as the weakest link instead of the maximum achievable impact"
  - "Not referencing specific finding IDs in the chain narrative"
  - "Building chains that require unlikely preconditions (e.g., physical access)"
  - "Forgetting to recommend which single fix breaks the entire chain"
