id: methodology-web-app-assessment
name: Web Application Penetration Test Methodology
category: methodology
description: >
  Full PTES-aligned web application penetration test playbook. Guides the agent
  through a structured assessment from reconnaissance to final reporting, ensuring
  comprehensive coverage of OWASP Top 10 and business logic flaws.

steps:
  - step: 1
    name: Reconnaissance
    actions:
      - "Run port scan (nmap/naabu) to identify web services and non-standard ports"
      - "Fingerprint technologies: server headers, cookies, HTML meta, /favicon.ico hash"
      - "Enumerate subdomains via DNS brute force, certificate transparency logs"
      - "Discover endpoints: crawl the app, parse sitemap.xml, robots.txt, .well-known/"
      - "Identify WAF presence (Cloudflare, Akamai, ModSecurity) — adjust payloads accordingly"

  - step: 2
    name: Application Mapping
    actions:
      - "Map all entry points: forms, API endpoints, WebSocket connections, file uploads"
      - "Identify authentication mechanisms (session cookie, JWT, OAuth, API key)"
      - "Document user roles and privilege levels"
      - "Catalog parameters per endpoint (query, body, headers, path segments)"
      - "Note content types accepted (JSON, XML, multipart, GraphQL)"

  - step: 3
    name: Authentication Testing
    actions:
      - "Test default/weak credentials on login and admin panels"
      - "Check account lockout policy and brute-force resilience"
      - "Verify password complexity requirements are enforced server-side"
      - "Test password reset flow for token leakage, user enumeration, rate limiting"
      - "Analyze session tokens: entropy, predictability, secure/httponly/samesite flags"
      - "Test session fixation and session invalidation on logout"

  - step: 4
    name: Authorization Testing
    actions:
      - "Test IDOR: replace resource IDs in URLs and bodies with other users' IDs"
      - "Test horizontal privilege escalation between same-role users"
      - "Test vertical privilege escalation: access admin endpoints as regular user"
      - "Verify API endpoints enforce authorization independently of the UI"
      - "Check if direct object references can be enumerated (sequential IDs)"

  - step: 5
    name: Input Validation Testing
    actions:
      - "Test SQL injection on all parameter types (GET, POST, headers, cookies)"
      - "Test XSS: reflected, stored, DOM-based across all input fields"
      - "Test SSRF via URL parameters, webhook configs, import features"
      - "Test command injection in parameters that interact with OS commands"
      - "Test path traversal on file download/include endpoints"
      - "Test SSTI in template-rendered user content"
      - "Test XXE if XML input is accepted anywhere"

  - step: 6
    name: Business Logic Testing
    actions:
      - "Test price/quantity manipulation in e-commerce flows"
      - "Test workflow bypass: skip steps in multi-step processes"
      - "Test race conditions on balance transfers, coupon redemption, voting"
      - "Test feature abuse: can free-tier users access premium features?"
      - "Verify rate limiting on sensitive operations (login, API calls, exports)"

  - step: 7
    name: Reporting
    actions:
      - "Build attack chains linking related findings for maximum impact"
      - "Assign severity based on exploitability and business impact"
      - "Include PoC evidence: HTTP requests/responses, screenshots, reproduction steps"
      - "Provide remediation guidance with code examples specific to the tech stack"
      - "Generate SARIF output for CI/CD integration"

tips:
  - "Always test with and without authentication — unauthenticated findings are higher severity"
  - "Re-test after discovering new technologies mid-assessment (e.g., finding a GraphQL endpoint)"
  - "Check JavaScript files for hardcoded API keys, internal endpoints, and debug flags"
  - "Test both JSON and form-encoded content types on the same endpoint"

common_mistakes:
  - "Skipping authorization testing because the UI hides admin features"
  - "Testing only GET parameters and ignoring request headers and cookies"
  - "Not checking for CORS misconfigurations alongside XSS findings"
  - "Forgetting to test file upload endpoints for unrestricted types"
  - "Reporting findings without verifiable PoC evidence"
