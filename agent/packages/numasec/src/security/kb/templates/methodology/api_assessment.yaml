id: methodology-api-assessment
name: API Security Assessment Methodology
category: methodology
description: >
  Structured methodology for testing REST and GraphQL API security. Covers
  endpoint discovery, authentication, authorization, input validation, rate
  limiting, and data exposure. Applicable to both documented and undocumented APIs.

steps:
  - step: 1
    name: Endpoint Discovery
    actions:
      - "Fetch OpenAPI/Swagger spec from /openapi.json, /swagger.json, /api-docs"
      - "Parse GraphQL schema via introspection query at /graphql"
      - "Fuzz common API paths: /api/v1/, /api/v2/, /rest/, /graphql"
      - "Analyze JavaScript bundles for hardcoded API routes and internal endpoints"
      - "Check for undocumented endpoints: /api/debug, /api/admin, /api/internal"
      - "Identify API versioning scheme (path, header, query parameter)"

  - step: 2
    name: Authentication Testing
    actions:
      - "Test endpoints without any authentication header — find unprotected routes"
      - "Test expired/revoked tokens — verify server-side validation"
      - "For JWT: test alg:none, weak HMAC secrets, key confusion (RS256→HS256)"
      - "For API keys: test if keys are scoped (read-only vs write), rotatable, revocable"
      - "For OAuth: test redirect_uri manipulation, scope escalation, token leakage"
      - "Check if authentication errors reveal valid usernames (timing, message differences)"

  - step: 3
    name: Authorization Testing
    actions:
      - "Test BOLA/IDOR: replace resource IDs in GET /api/users/{id}, DELETE, PATCH"
      - "Test BFLA: call admin-only endpoints (user management, config) with regular token"
      - "Test object-level access: can user A read/modify user B's resources?"
      - "For GraphQL: test nested query authorization (user → orders → other user's orders)"
      - "Verify that bulk/list endpoints filter by the authenticated user's scope"

  - step: 4
    name: Input Validation
    actions:
      - "Test SQL injection in query parameters, JSON body fields, and path segments"
      - "Test NoSQL injection: {\"$gt\":\"\"}, {\"$ne\":\"\"} in MongoDB-backed endpoints"
      - "Test mass assignment: send extra fields (role, isAdmin, balance) in POST/PATCH"
      - "Send oversized payloads (1MB+ JSON bodies) to test parser limits"
      - "Test type confusion: send string where integer expected, array where string expected"
      - "For GraphQL: test deeply nested queries, alias-based batching, directive injection"

  - step: 5
    name: Rate Limiting and Abuse
    actions:
      - "Send 100+ rapid requests to auth endpoints — check for 429 responses"
      - "Test if rate limiting is per-IP, per-user, or per-API-key"
      - "Check if rate limit can be bypassed via X-Forwarded-For header rotation"
      - "Test resource-intensive endpoints for DoS potential (complex queries, large exports)"
      - "For GraphQL: test query complexity limits and depth restrictions"

  - step: 6
    name: Data Exposure
    actions:
      - "Compare API responses to UI display — API may return extra sensitive fields"
      - "Check verbose error messages for stack traces, SQL queries, internal paths"
      - "Test if deleted resources are still accessible via direct API call"
      - "Check response headers for server version, internal IPs, debug info"
      - "Verify PII is not exposed in URLs (logged by proxies, CDNs, browser history)"
      - "Test if API supports JSONP (potential cross-origin data leakage)"

tips:
  - "Use the OpenAPI spec to auto-generate test cases for every parameter on every endpoint"
  - "GraphQL introspection disabled? Try field suggestion via typos: {user(id:1){usrname}}"
  - "Always test both authenticated and unauthenticated — missing auth is often per-endpoint"
  - "Check for API versioning bypass: old versions may lack security controls"

common_mistakes:
  - "Only testing endpoints listed in documentation — undocumented endpoints are common"
  - "Ignoring PATCH/DELETE methods when only testing GET/POST"
  - "Not testing authorization on nested GraphQL resolvers"
  - "Assuming rate limiting exists because the docs mention it — always verify"
  - "Missing mass assignment because request body is only tested with expected fields"
